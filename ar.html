<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARビューア</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:sans-serif;
}

model-viewer{
  width:100%;
  height:100vh;
  background:transparent;
}

.panel{
  position:fixed;
  left:10px;
  right:10px;
  background:rgba(0,0,0,0.6);
  padding:12px;
  border-radius:12px;
}

#top{
  top:10px;
}

#bottom{
  bottom:10px;
  display:flex;
  gap:10px;
}

button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2b78de;
  color:#fff;
  font-weight:bold;
}

button:disabled{
  opacity:0.4;
}

#list{
  position:fixed;
  bottom:80px;
  left:10px;
  right:10px;
  max-height:200px;
  overflow:auto;
  background:rgba(0,0,0,0.8);
  border-radius:12px;
  padding:10px;
}

.item{
  padding:10px;
  margin-bottom:6px;
  background:#333;
  border-radius:8px;
}
.item.active{
  background:#2b78de;
}
</style>
</head>

<body>

<model-viewer id="mv" ar camera-controls auto-rotate></model-viewer>

<div id="top" class="panel">
  <div>ARビューア</div>
  <div id="file">未選択</div>
  <div id="status">読み込み待機</div>
</div>

<div id="list"></div>

<div id="bottom" class="panel">
  <button id="arBtn">ARで表示</button>
  <button id="backBtn">3Dビューアへ</button>
</div>

<script>
const mv = document.getElementById("mv");
const list = document.getElementById("list");
const status = document.getElementById("status");
const fileText = document.getElementById("file");
const arBtn = document.getElementById("arBtn");

let current = "";

// 🔥 修正済みAPI（ここ重要）
async function getGLB(){
  const res = await fetch("https://api.github.com/repos/ASKR-created/ASKR-created.github.io/contents");
  const data = await res.json();

  return data
    .filter(f => f.name.endsWith(".glb"))
    .map(f => f.name);
}

// 一覧生成
function build(files){
  list.innerHTML = "";

  if(files.length === 0){
    list.innerHTML = "GLBなし";
    return;
  }

  files.forEach(f=>{
    const div = document.createElement("div");
    div.className = "item";
    div.innerText = f;

    div.onclick = ()=>{
      current = f;
      mv.src = f;
      fileText.innerText = f;
      status.innerText = "読み込み中";
      update();
    };

    list.appendChild(div);
  });
}

// ボタン状態
function update(){
  arBtn.disabled = !current;

  document.querySelectorAll(".item").forEach(el=>{
    el.classList.toggle("active", el.innerText === current);
  });
}

// AR起動
arBtn.onclick = async ()=>{
  if(!current) return;

  try{
    await mv.activateAR();
  }catch{
    alert("AR非対応端末");
  }
};

// 戻る
document.getElementById("backBtn").onclick = ()=>{
  location.href = "index.html";
};

// 読み込み成功
mv.addEventListener("load", ()=>{
  status.innerText = "読み込み完了";
});

// 読み込み失敗
mv.addEventListener("error", ()=>{
  status.innerText = "読み込み失敗";
});

// 初期化
(async ()=>{
  status.innerText = "一覧取得中...";
  const files = await getGLB();
  build(files);

  if(files.length > 0){
    current = files[0];
    mv.src = current;
    fileText.innerText = current;
  }

  update();
})();
</script>

</body>
</html>
