<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ARビューア</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    :root{
      --panel: rgba(20,24,31,0.62);
      --panel-strong: rgba(20,24,31,0.84);
      --panel-border: rgba(255,255,255,0.10);
      --text: #f4f6f8;
      --sub: #c7cfdb;
      --accent: #4ea1ff;
      --accent2: #2b78de;
      --ok: #79d98f;
      --danger: #ff8484;
      --shadow: 0 10px 30px rgba(0,0,0,0.22);
      --radius: 16px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html, body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background: linear-gradient(180deg, #13161c, #1b2028);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
    }

    #app{
      position:relative;
      width:100%;
      height:100%;
      overflow:hidden;
    }

    model-viewer{
      width:100%;
      height:100%;
      background: transparent;
      --poster-color: transparent;
    }

    .panel{
      position:absolute;
      z-index:10;
      background:var(--panel);
      border:1px solid var(--panel-border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      overflow:hidden;
    }

    .panelHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      cursor:pointer;
      user-select:none;
    }

    .panelHeaderTitle{
      font-size:13px;
      font-weight:800;
      color:#fff;
      margin:0;
    }

    .toggleMark{
      font-size:12px;
      color:#fff;
      opacity:0.9;
      flex-shrink:0;
    }

    #topPanel{
      top:calc(10px + var(--safe-top));
      left:10px;
      right:10px;
      padding:12px 14px;
    }

    #topPanelContent{
      margin-top:8px;
    }

    #title{
      margin:0 0 8px 0;
      font-size:17px;
      font-weight:800;
      line-height:1.35;
    }

    .label{
      margin:8px 0 2px 0;
      font-size:11px;
      font-weight:700;
      color:#ffffff;
      opacity:0.95;
    }

    .value{
      margin:0;
      font-size:12px;
      line-height:1.55;
      color:var(--sub);
      word-break:break-word;
      white-space:pre-line;
    }

    #currentData{
      color:var(--ok);
      font-weight:700;
    }

    #status{
      margin-top:8px;
      font-size:11px;
      line-height:1.45;
      color:var(--sub);
      white-space:pre-line;
      word-break:break-word;
    }

    #loading{
      position:absolute;
      left:50%;
      bottom:calc(168px + var(--safe-bottom));
      transform:translateX(-50%);
      z-index:25;
      padding:8px 14px;
      border-radius:999px;
      font-size:11px;
      background:rgba(0,0,0,0.52);
      border:1px solid rgba(255,255,255,0.14);
      display:none;
      white-space:nowrap;
    }

    #modelPanel{
      z-index:22;
      left:10px;
      right:10px;
      bottom:calc(118px + var(--safe-bottom));
      padding:10px;
      max-height:32vh;
      background:var(--panel-strong);
    }

    #modelPanelContent{
      margin-top:8px;
      max-height:calc(32vh - 34px);
      overflow:auto;
    }

    #modelList{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .modelBtn{
      width:100%;
      min-height:40px;
      border:none;
      border-radius:12px;
      color:#fff;
      font-size:14px;
      font-weight:700;
      text-align:left;
      padding:9px 11px;
      cursor:pointer;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.10);
    }

    .modelBtn.active{
      background:linear-gradient(180deg,var(--accent),var(--accent2));
      border-color:rgba(255,255,255,0.18);
    }

    .emptyBox{
      padding:14px 12px;
      border-radius:12px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      color:var(--sub);
      font-size:13px;
      line-height:1.7;
    }

    #bottomPanel{
      left:10px;
      right:10px;
      bottom:calc(10px + var(--safe-bottom));
      padding:10px;
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap:10px;
      align-items:center;
    }

    .btn{
      width:100%;
      min-height:44px;
      border:none;
      border-radius:14px;
      color:#fff;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
      background:linear-gradient(180deg,var(--accent),var(--accent2));
      box-shadow:0 6px 16px rgba(43,120,222,0.24);
    }

    .btn.sub{
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.10);
      box-shadow:none;
    }

    .btn:disabled{
      opacity:0.45;
      cursor:default;
    }

    .btn:active,
    .modelBtn:active{
      transform:scale(0.985);
    }

    #errorBox{
      position:absolute;
      left:10px;
      right:10px;
      bottom:calc(232px + var(--safe-bottom));
      z-index:11;
      padding:12px 14px;
      border-radius:14px;
      background:rgba(90,20,20,0.78);
      border:1px solid rgba(255,255,255,0.10);
      color:#fff;
      display:none;
      font-size:13px;
      line-height:1.7;
      white-space:pre-line;
    }

    @media (min-width: 900px){
      #topPanel{
        left:16px;
        right:auto;
        width:340px;
        top:16px;
      }

      #modelPanel{
        left:auto;
        right:16px;
        width:300px;
        bottom:74px;
        max-height:260px;
      }

      #modelPanelContent{
        max-height:200px;
      }

      #bottomPanel{
        left:auto;
        right:16px;
        width:300px;
        bottom:16px;
      }

      #errorBox{
        left:auto;
        right:16px;
        width:300px;
        bottom:190px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <model-viewer
      id="mv"
      src=""
      alt="AR 3D model"
      ar
      ar-modes="webxr scene-viewer quick-look"
      camera-controls
      touch-action="pan-y"
      shadow-intensity="1"
      exposure="1"
      environment-image="neutral"
      auto-rotate
      interaction-prompt="auto">
    </model-viewer>

    <div id="topPanel" class="panel">
      <div id="topPanelHeader" class="panelHeader">
        <div class="panelHeaderTitle">ARビューア</div>
        <div id="topToggleMark" class="toggleMark">▼</div>
      </div>

      <div id="topPanelContent">
        <div class="label">表示中のデータ</div>
        <div id="fileName" class="value">未選択</div>

        <div class="label">操作方法</div>
        <div class="value">通常表示:
1本指で回転
2本指で拡大縮小・移動

AR表示中:
1本指で移動
2本指で回転
ピンチで拡大縮小</div>

        <div id="status">準備中...</div>
      </div>
    </div>

    <div id="errorBox"></div>

    <div id="modelPanel" class="panel">
      <div id="modelPanelHeader" class="panelHeader">
        <div class="panelHeaderTitle">GLB一覧</div>
        <div id="modelToggleMark" class="toggleMark">▼</div>
      </div>

      <div id="modelPanelContent">
        <div id="modelList"></div>
      </div>
    </div>

    <div id="bottomPanel" class="panel">
      <button id="arBtn" class="btn" type="button">ARで表示</button>
      <button id="resetBtn" class="btn sub" type="button">視点リセット</button>
      <button id="backBtn" class="btn sub" type="button">3Dビューアへ</button>
    </div>

    <div id="loading">モデルを読み込み中...</div>
  </div>

  <script>
    const API_URL = "https://api.github.com/repos/ASKR-created/ASKR-created.github.io/contents";

    const mv = document.getElementById("mv");
    const statusEl = document.getElementById("status");
    const errorBox = document.getElementById("errorBox");
    const arBtn = document.getElementById("arBtn");
    const resetBtn = document.getElementById("resetBtn");
    const backBtn = document.getElementById("backBtn");
    const fileNameEl = document.getElementById("fileName");
    const modelList = document.getElementById("modelList");
    const loadingEl = document.getElementById("loading");

    const topPanelContent = document.getElementById("topPanelContent");
    const modelPanelContent = document.getElementById("modelPanelContent");
    const topPanelHeader = document.getElementById("topPanelHeader");
    const modelPanelHeader = document.getElementById("modelPanelHeader");
    const topToggleMark = document.getElementById("topToggleMark");
    const modelToggleMark = document.getElementById("modelToggleMark");

    let currentFile = "";
    let glbFiles = [];
    let topPanelOpen = true;
    let modelPanelOpen = true;

    function setStatus(text, isError = false){
      statusEl.textContent = text;
      statusEl.style.color = isError ? "#ff8484" : "#79d98f";
    }

    function setLoading(flag){
      loadingEl.style.display = flag ? "block" : "none";
    }

    function showError(text){
      errorBox.style.display = "block";
      errorBox.textContent = text;
      setStatus("読み込み失敗", true);
    }

    function hideError(){
      errorBox.style.display = "none";
      errorBox.textContent = "";
    }

    function applyPanelState() {
      topPanelContent.style.display = topPanelOpen ? "block" : "none";
      modelPanelContent.style.display = modelPanelOpen ? "block" : "none";
      topToggleMark.textContent = topPanelOpen ? "▼" : "▶";
      modelToggleMark.textContent = modelPanelOpen ? "▼" : "▶";
    }

    function setInitialPanelState() {
      if (window.innerWidth >= 900) {
        topPanelOpen = true;
        modelPanelOpen = true;
      } else {
        topPanelOpen = false;
        modelPanelOpen = false;
      }
      applyPanelState();
    }

    function toggleTopPanel() {
      topPanelOpen = !topPanelOpen;
      applyPanelState();
    }

    function toggleModelPanel() {
      modelPanelOpen = !modelPanelOpen;
      applyPanelState();
    }

    async function fetchGlbFilesFromGitHub() {
      const response = await fetch(API_URL, {
        headers: {
          "Accept": "application/vnd.github+json"
        }
      });

      if (!response.ok) {
        throw new Error(`GitHub API エラー: ${response.status}`);
      }

      const items = await response.json();

      return items
        .filter((item) => item.type === "file" && /\.glb$/i.test(item.name))
        .map((item) => item.name)
        .sort((a, b) => a.localeCompare(b, "ja"));
    }

    function getQueryFile() {
      const params = new URLSearchParams(window.location.search);
      return params.get("file") || "";
    }

    function updateButtons() {
      arBtn.disabled = !currentFile;
    }

    function updateListActive() {
      const buttons = modelList.querySelectorAll(".modelBtn");
      buttons.forEach((btn) => {
        if (btn.dataset.file === currentFile) {
          btn.classList.add("active");
        } else {
          btn.classList.remove("active");
        }
      });
    }

    function buildModelList(files) {
      modelList.innerHTML = "";

      if (!files.length) {
        const empty = document.createElement("div");
        empty.className = "emptyBox";
        empty.textContent = "GLBデータはありません";
        modelList.appendChild(empty);
        fileNameEl.textContent = "GLBデータはありません";
        updateButtons();
        return;
      }

      files.forEach((file) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "modelBtn";
        btn.textContent = file;
        btn.dataset.file = file;

        btn.addEventListener("click", () => {
          loadFile(file);
          if (window.innerWidth < 900) {
            modelPanelOpen = false;
            applyPanelState();
          }
        });

        modelList.appendChild(btn);
      });

      updateListActive();
    }

    function loadFile(file) {
      currentFile = file;
      fileNameEl.textContent = file;
      updateButtons();
      updateListActive();
      hideError();
      setLoading(true);
      setStatus("読み込み中...");
      mv.src = file;
    }

    mv.addEventListener("load", () => {
      hideError();
      setLoading(false);
      setStatus("読み込み完了");
    });

    mv.addEventListener("error", () => {
      setLoading(false);
      showError(currentFile + " の読み込みに失敗しました。\nファイル名やアップロード先を確認してください。");
    });

    arBtn.addEventListener("click", async () => {
      try{
        if (!currentFile) {
          showError("表示中のGLBがありません。");
          return;
        }
        if (typeof mv.activateAR === "function") {
          await mv.activateAR();
        } else {
          showError("この端末ではAR起動に対応していません。");
        }
      } catch (e){
        showError("ARを開始できませんでした。\n端末やブラウザのAR対応状況を確認してください。");
      }
    });

    resetBtn.addEventListener("click", () => {
      mv.cameraOrbit = "0deg 75deg auto";
      mv.fieldOfView = "auto";
      hideError();
      setStatus("視点をリセットしました");
    });

    backBtn.addEventListener("click", () => {
      sessionStorage.setItem("obj_viewer_unlocked", "1");

      const objFromGlb = currentFile ? currentFile.replace(/\.glb$/i, ".obj") : "";
      if (objFromGlb) {
        sessionStorage.setItem("last_obj_file", objFromGlb);
      }

      window.location.href = "index.html";
    });

    async function init() {
      try {
        setStatus("GLB一覧を確認中...");
        setLoading(true);

        glbFiles = await fetchGlbFilesFromGitHub();
        buildModelList(glbFiles);

        if (!glbFiles.length) {
          setLoading(false);
          setStatus("GLBデータはありません", true);
          return;
        }

        const queryFile = getQueryFile();
        if (queryFile && glbFiles.includes(queryFile)) {
          loadFile(queryFile);
        } else {
          loadFile(glbFiles[0]);
        }

        setInitialPanelState();
      } catch (e) {
        setLoading(false);
        showError("起動に失敗しました。\n" + e.message);
      }
    }

    topPanelHeader.addEventListener("click", toggleTopPanel);
    modelPanelHeader.addEventListener("click", toggleModelPanel);

    updateButtons();
    setInitialPanelState();
    init();
  </script>
</body>
</html>
