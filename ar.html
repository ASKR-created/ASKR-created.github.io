<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ARビューア</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    :root{
      --panel: rgba(20,24,31,0.62);
      --panel-border: rgba(255,255,255,0.10);
      --text: #f4f6f8;
      --sub: #c7cfdb;
      --accent: #4ea1ff;
      --accent2: #2b78de;
      --ok: #79d98f;
      --danger: #ff8484;
      --shadow: 0 10px 30px rgba(0,0,0,0.22);
      --radius: 16px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html, body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background: linear-gradient(180deg, #13161c, #1b2028);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
    }

    #app{
      position:relative;
      width:100%;
      height:100%;
      overflow:hidden;
    }

    model-viewer{
      width:100%;
      height:100%;
      background: transparent;
      --poster-color: transparent;
    }

    .panel{
      position:absolute;
      z-index:10;
      background:var(--panel);
      border:1px solid var(--panel-border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }

    #topPanel{
      top:calc(10px + var(--safe-top));
      left:10px;
      right:10px;
      padding:14px 16px;
    }

    #title{
      margin:0 0 10px 0;
      font-size:18px;
      font-weight:800;
      line-height:1.4;
    }

    .label{
      margin:10px 0 4px 0;
      font-size:12px;
      font-weight:700;
      color:#ffffff;
      opacity:0.95;
    }

    .value{
      margin:0;
      font-size:13px;
      line-height:1.7;
      color:var(--sub);
      white-space:pre-line;
      word-break:break-word;
    }

    #status{
      margin-top:8px;
      font-size:12px;
      line-height:1.6;
      color:var(--ok);
      white-space:pre-line;
      word-break:break-word;
    }

    #bottomPanel{
      left:10px;
      right:10px;
      bottom:calc(10px + var(--safe-bottom));
      padding:10px;
      display:grid;
      grid-template-columns: 1fr;
      gap:10px;
      align-items:center;
    }

    .btn{
      width:100%;
      height:48px;
      border:none;
      border-radius:14px;
      color:#fff;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
      background:linear-gradient(180deg,var(--accent),var(--accent2));
      box-shadow:0 6px 16px rgba(43,120,222,0.24);
    }

    .btn.sub{
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.10);
      box-shadow:none;
    }

    .btn:active{
      transform:scale(0.985);
    }

    #errorBox{
      position:absolute;
      left:10px;
      right:10px;
      bottom:calc(178px + var(--safe-bottom));
      z-index:11;
      padding:12px 14px;
      border-radius:14px;
      background:rgba(90,20,20,0.78);
      border:1px solid rgba(255,255,255,0.10);
      color:#fff;
      display:none;
      font-size:13px;
      line-height:1.7;
      white-space:pre-line;
    }

    @media (min-width: 900px){
      #topPanel{
        left:16px;
        right:auto;
        width:360px;
        top:16px;
      }

      #bottomPanel{
        left:auto;
        right:16px;
        width:320px;
        bottom:16px;
      }

      #errorBox{
        left:auto;
        right:16px;
        width:320px;
        bottom:184px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <model-viewer
      id="mv"
      src=""
      alt="AR 3D model"
      ar
      ar-modes="webxr scene-viewer quick-look"
      camera-controls
      touch-action="pan-y"
      shadow-intensity="1"
      exposure="1"
      environment-image="neutral"
      auto-rotate
      interaction-prompt="auto">
    </model-viewer>

    <div id="topPanel" class="panel">
      <div id="title">ARビューア</div>

      <div class="label">表示中のデータ</div>
      <div id="fileName" class="value">読み込み中...</div>

      <div class="label">操作方法</div>
      <div class="value">通常表示では指で回転・拡大縮小
AR対応端末では下のARで表示から現実空間に配置</div>

      <div id="status">読み込み中...</div>
    </div>

    <div id="errorBox"></div>

    <div id="bottomPanel" class="panel">
      <button id="arBtn" class="btn" type="button">ARで表示</button>
      <button id="resetBtn" class="btn sub" type="button">視点リセット</button>
      <button id="backBtn" class="btn sub" type="button">3Dビューアへ</button>
    </div>
  </div>

  <script>
    const mv = document.getElementById("mv");
    const statusEl = document.getElementById("status");
    const errorBox = document.getElementById("errorBox");
    const arBtn = document.getElementById("arBtn");
    const resetBtn = document.getElementById("resetBtn");
    const backBtn = document.getElementById("backBtn");
    const fileNameEl = document.getElementById("fileName");

    function getQueryFile() {
      const params = new URLSearchParams(window.location.search);
      return params.get("file") || "model.glb";
    }

    const currentFile = getQueryFile();
    mv.src = currentFile;
    fileNameEl.textContent = currentFile;

    function setStatus(text, isError = false){
      statusEl.textContent = text;
      statusEl.style.color = isError ? "#ff8484" : "#79d98f";
    }

    function showError(text){
      errorBox.style.display = "block";
      errorBox.textContent = text;
      setStatus("読み込み失敗", true);
    }

    function hideError(){
      errorBox.style.display = "none";
      errorBox.textContent = "";
    }

    mv.addEventListener("load", () => {
      hideError();
      setStatus("読み込み完了");
    });

    mv.addEventListener("error", () => {
      showError(currentFile + " の読み込みに失敗しました。\nファイル名やアップロード先を確認してください。");
    });

    arBtn.addEventListener("click", async () => {
      try{
        if (typeof mv.activateAR === "function") {
          await mv.activateAR();
        } else {
          showError("この端末ではAR起動に対応していません。");
        }
      } catch (e){
        showError("ARを開始できませんでした。\n端末やブラウザのAR対応状況を確認してください。");
      }
    });

    resetBtn.addEventListener("click", () => {
      mv.cameraOrbit = "0deg 75deg auto";
      mv.fieldOfView = "auto";
      hideError();
      setStatus("視点をリセットしました");
    });

    backBtn.addEventListener("click", () => {
      window.location.href = "index.html";
    });

    window.addEventListener("load", () => {
      setStatus("読み込み中...");
    });
  </script>
</body>
</html>
