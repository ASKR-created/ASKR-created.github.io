<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARビューア</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
}
model-viewer{
    width:100%;
    height:100vh;
}
button{
    position:fixed;
    bottom:10px;
    left:10px;
    right:10px;
    height:50px;
    font-size:16px;
}
</style>
</head>

<body>

<model-viewer
id="mv"
src=""
ios-src=""
ar
ar-modes="webxr scene-viewer quick-look"
camera-controls
auto-rotate>
</model-viewer>

<button onclick="startAR()">AR開始</button>

<script>
const mv = document.getElementById("mv");

const params = new URLSearchParams(location.search);
const file = params.get("file");

if(file){
    mv.src = file;

    // iPhone用
    const usdz = file.replace(/\.\w+$/, ".usdz");
    mv.setAttribute("ios-src", usdz);
}

async function startAR(){
    if(mv.activateAR){
        await mv.activateAR();
    }else{
        alert("この端末ではAR非対応");
    }
}
</script>

</body>
</html>
