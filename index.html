<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OBJ共有ビューア</title>
  <style>
    :root{
      --bg1:#13161c;
      --bg2:#1b2028;
      --panel:rgba(20,24,31,0.88);
      --panel-border:rgba(255,255,255,0.10);
      --text:#f4f6f8;
      --sub:#c7cfdb;
      --accent:#4ea1ff;
      --accent2:#2b78de;
      --ok:#79d98f;
      --danger:#ff8484;
      --warn:#ffd38d;
      --shadow:0 10px 30px rgba(0,0,0,0.34);
      --radius:16px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
      color:var(--text);
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
    }

    body{
      overscroll-behavior:none;
    }

    #app{
      position:relative;
      width:100%;
      height:100%;
      overflow:hidden;
    }

    #viewer{
      position:absolute;
      inset:0;
      display:block;
    }

    canvas{
      display:block;
      width:100%;
      height:100%;
    }

    .panel{
      position:absolute;
      z-index:20;
      background:var(--panel);
      border:1px solid var(--panel-border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }

    #topPanel{
      top:calc(10px + var(--safe-top));
      left:10px;
      right:10px;
      padding:12px 14px;
    }

    #title{
      margin:0 0 6px 0;
      font-size:17px;
      font-weight:700;
      line-height:1.4;
    }

    #subText{
      margin:0;
      font-size:12px;
      line-height:1.7;
      color:var(--sub);
    }

    #status{
      margin-top:8px;
      font-size:12px;
      line-height:1.6;
      color:var(--sub);
      word-break:break-word;
    }

    #hintBubble{
      position:absolute;
      right:10px;
      top:calc(96px + var(--safe-top));
      z-index:18;
      padding:10px 12px;
      border-radius:14px;
      background:rgba(0,0,0,0.42);
      border:1px solid rgba(255,255,255,0.10);
      font-size:12px;
      line-height:1.6;
      color:#eef3fb;
      max-width:220px;
      pointer-events:none;
      opacity:1;
      transition:opacity 0.4s ease;
    }

    #loading{
      position:absolute;
      left:50%;
      bottom:calc(144px + var(--safe-bottom));
      transform:translateX(-50%);
      z-index:25;
      padding:10px 16px;
      border-radius:999px;
      font-size:12px;
      background:rgba(0,0,0,0.58);
      border:1px solid rgba(255,255,255,0.14);
      display:none;
      white-space:nowrap;
    }

    #modelPanel{
      left:10px;
      right:10px;
      bottom:calc(70px + var(--safe-bottom));
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:8px;
      max-height:155px;
      overflow:auto;
    }

    #modelPanelTitle{
      font-size:13px;
      font-weight:700;
      color:#fff;
      margin:0 0 2px 0;
    }

    .modelBtn{
      width:100%;
      min-height:42px;
      border:none;
      border-radius:12px;
      color:#fff;
      font-size:14px;
      font-weight:700;
      text-align:left;
      padding:10px 12px;
      cursor:pointer;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.10);
    }

    .modelBtn.active{
      background:linear-gradient(180deg,var(--accent),var(--accent2));
      border-color:rgba(255,255,255,0.18);
    }

    #bottomBar{
      left:10px;
      right:10px;
      bottom:calc(10px + var(--safe-bottom));
      padding:10px;
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
    }

    .bigBtn{
      flex:1;
      height:48px;
      border:none;
      border-radius:14px;
      color:#fff;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      background:linear-gradient(180deg,var(--accent),var(--accent2));
      box-shadow:0 6px 16px rgba(43,120,222,0.34);
    }

    .bigBtn.sub{
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.10);
      box-shadow:none;
    }

    .bigBtn:active,
    .modelBtn:active,
    #unlockBtn:active{
      transform:scale(0.985);
    }

    #gate{
      position:fixed;
      inset:0;
      z-index:60;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px 14px;
      background:
        radial-gradient(circle at center top, rgba(78,161,255,0.18), transparent 38%),
        rgba(0,0,0,0.62);
    }

    #gateCard{
      width:100%;
      max-width:420px;
      background:rgba(18,22,28,0.96);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:20px;
      box-shadow:0 20px 44px rgba(0,0,0,0.42);
      padding:20px 16px 16px;
    }

    #gateTitle{
      margin:0 0 10px 0;
      font-size:22px;
      line-height:1.4;
      font-weight:800;
    }

    #gateText{
      margin:0;
      font-size:14px;
      line-height:1.8;
      color:var(--sub);
    }

    .field{
      margin-top:14px;
    }

    .field label{
      display:block;
      margin-bottom:7px;
      font-size:13px;
      color:var(--sub);
    }

    .field input{
      width:100%;
      height:50px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.14);
      background:rgba(255,255,255,0.06);
      color:#fff;
      font-size:16px;
      padding:0 14px;
      outline:none;
    }

    .field input:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(78,161,255,0.18);
    }

    #unlockBtn{
      width:100%;
      height:50px;
      margin-top:14px;
      border:none;
      border-radius:14px;
      font-size:16px;
      font-weight:800;
      color:#fff;
      background:linear-gradient(180deg,var(--accent),var(--accent2));
      cursor:pointer;
    }

    #gateMsg{
      min-height:22px;
      margin-top:10px;
      font-size:13px;
      color:var(--danger);
      line-height:1.6;
      white-space:pre-line;
    }

    #note{
      margin-top:10px;
      padding:10px 12px;
      border-radius:12px;
      font-size:12px;
      line-height:1.7;
      color:var(--warn);
      background:rgba(255,211,141,0.08);
      border:1px solid rgba(255,211,141,0.16);
    }

    @media (min-width: 800px){
      #topPanel{
        left:50%;
        right:auto;
        width:430px;
        transform:translateX(-50%);
      }

      #modelPanel{
        left:50%;
        right:auto;
        width:430px;
        transform:translateX(-50%);
      }

      #bottomBar{
        left:50%;
        right:auto;
        width:430px;
        transform:translateX(-50%);
      }

      #hintBubble{
        right:calc(50% - 330px);
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="viewer"></div>

    <div id="gate">
      <div id="gateCard">
        <h1 id="gateTitle">閲覧用パスワード</h1>
        <p id="gateText">共有されたパスワードを入力すると、OBJモデルを選択して表示できます。</p>

        <div class="field">
          <label for="passwordInput">パスワード</label>
          <input id="passwordInput" type="password" placeholder="半角で p001 を入力" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
        </div>

        <button id="unlockBtn" type="button">開く</button>
        <div id="gateMsg"></div>

        <div id="note">
          パスワードは <strong>半角の p001</strong> です。<br>
          全角の「ｐ001」でも通るように補正しています。
        </div>
      </div>
    </div>

    <div id="topPanel" class="panel">
      <div id="title">OBJ共有ビューア</div>
      <p id="subText">
        1本指で回転 / 2本指で移動・拡大縮小<br>
        パスワード通過後にOBJを選択できます
      </p>
      <div id="status">待機中</div>
    </div>

    <div id="hintBubble">モデルを指で動かせます</div>

    <div id="modelPanel" class="panel">
      <div id="modelPanelTitle">モデル一覧</div>
      <div id="modelList"></div>
    </div>

    <div id="bottomBar" class="panel">
      <button id="resetBtn" class="bigBtn" type="button">視点リセット</button>
      <button id="copyBtn" class="bigBtn sub" type="button">URLコピー</button>
    </div>

    <div id="loading">モデルを読み込み中...</div>
  </div>

  <script>
    (function () {
      const PASSWORD = "p001";

      // ここにアップロード予定のOBJファイル名を追加
      const MODELS = [
        { name: "モデル1", file: "model1.obj" },
        { name: "モデル2", file: "model2.obj" },
        { name: "モデル3", file: "model3.obj" }
      ];

      const viewer = document.getElementById("viewer");
      const gate = document.getElementById("gate");
      const passwordInput = document.getElementById("passwordInput");
      const unlockBtn = document.getElementById("unlockBtn");
      const gateMsg = document.getElementById("gateMsg");
      const statusEl = document.getElementById("status");
      const loadingEl = document.getElementById("loading");
      const resetBtn = document.getElementById("resetBtn");
      const copyBtn = document.getElementById("copyBtn");
      const hintBubble = document.getElementById("hintBubble");
      const modelList = document.getElementById("modelList");
      const modelPanel = document.getElementById("modelPanel");

      let scene = null;
      let camera = null;
      let renderer = null;
      let controls = null;
      let currentObject = null;
      let hintTimer = null;
      let libsLoaded = false;
      let initDone = false;
      let currentModelFile = "";

      function setStatus(text, color) {
        statusEl.textContent = text;
        statusEl.style.color = color || "";
      }

      function setLoading(flag) {
        loadingEl.style.display = flag ? "block" : "none";
      }

      function hideHintSoon() {
        if (hintTimer) clearTimeout(hintTimer);
        hintTimer = setTimeout(function () {
          if (hintBubble) hintBubble.style.opacity = "0";
        }, 3200);
      }

      function normalizeInput(value) {
        return value
          .replace(/ｐ/g, "p")
          .replace(/Ｐ/g, "P")
          .trim();
      }

      function loadScript(src) {
        return new Promise(function (resolve, reject) {
          const s = document.createElement("script");
          s.src = src;
          s.onload = function () { resolve(); };
          s.onerror = function () { reject(new Error("読み込み失敗: " + src)); };
          document.head.appendChild(s);
        });
      }

      async function ensureThreeLibs() {
        if (libsLoaded) return;

        setStatus("3Dライブラリを読み込み中...");
        await loadScript("https://unpkg.com/three@0.160.0/build/three.min.js");
        await loadScript("https://unpkg.com/three@0.160.0/examples/js/controls/OrbitControls.js");
        await loadScript("https://unpkg.com/three@0.160.0/examples/js/loaders/OBJLoader.js");

        if (!window.THREE || !THREE.OrbitControls || !THREE.OBJLoader) {
          throw new Error("3Dライブラリの初期化に失敗しました");
        }

        libsLoaded = true;
      }

      function initThree() {
        if (initDone) return;

        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x161a21);

        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 5000);
        camera.position.set(0, 55, 145);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        viewer.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.screenSpacePanning = true;
        controls.enablePan = true;
        controls.enableZoom = true;
        controls.enableRotate = true;
        controls.minDistance = 30;
        controls.maxDistance = 320;
        controls.target.set(0, 24, 0);
        controls.update();

        controls.addEventListener("start", function () {
          if (hintBubble) hintBubble.style.opacity = "0";
        });

        const ambient = new THREE.AmbientLight(0xffffff, 1.45);
        scene.add(ambient);

        const dir1 = new THREE.DirectionalLight(0xffffff, 1.1);
        dir1.position.set(120, 180, 120);
        scene.add(dir1);

        const dir2 = new THREE.DirectionalLight(0xffffff, 0.45);
        dir2.position.set(-100, 60, -80);
        scene.add(dir2);

        const ground = new THREE.Mesh(
          new THREE.CircleGeometry(130, 64),
          new THREE.MeshStandardMaterial({
            color: 0x2a313d,
            roughness: 1.0,
            metalness: 0.0
          })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        scene.add(ground);

        const ring = new THREE.Mesh(
          new THREE.RingGeometry(128, 132, 64),
          new THREE.MeshBasicMaterial({
            color: 0x4a5568,
            transparent: true,
            opacity: 0.65,
            side: THREE.DoubleSide
          })
        );
        ring.rotation.x = -Math.PI / 2;
        ring.position.y = 0.02;
        scene.add(ring);

        window.addEventListener("resize", onResize, { passive: true });

        hideHintSoon();
        animate();
        initDone = true;
      }

      function onResize() {
        if (!camera || !renderer) return;
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }

      function animate() {
        requestAnimationFrame(animate);
        if (controls) controls.update();
        if (renderer && scene && camera) renderer.render(scene, camera);
      }

      function clearCurrentObject() {
        if (!currentObject) return;
        scene.remove(currentObject);
        currentObject.traverse(function (child) {
          if (child.isMesh) {
            if (child.geometry) child.geometry.dispose();
            if (child.material) {
              if (Array.isArray(child.material)) {
                child.material.forEach(function (m) { m.dispose(); });
              } else {
                child.material.dispose();
              }
            }
          }
        });
        currentObject = null;
      }

      function applyMaterial(object) {
        object.traverse(function (child) {
          if (child.isMesh) {
            child.material = new THREE.MeshStandardMaterial({
              color: 0xd9dde4,
              roughness: 0.84,
              metalness: 0.03
            });
          }
        });
      }

      function resetCamera() {
        if (!camera || !controls) return;
        camera.position.set(0, 55, 145);
        controls.target.set(0, 24, 0);
        controls.update();
      }

      function fitObject(object) {
        const box = new THREE.Box3().setFromObject(object);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();

        box.getSize(size);
        box.getCenter(center);
        object.position.sub(center);

        const maxAxis = Math.max(size.x, size.y, size.z);
        if (maxAxis > 0) {
          const scale = 88 / maxAxis;
          object.scale.setScalar(scale);
        }

        const box2 = new THREE.Box3().setFromObject(object);
        const center2 = new THREE.Vector3();
        box2.getCenter(center2);

        object.position.x -= center2.x;
        object.position.y -= box2.min.y;
        object.position.z -= center2.z;

        resetCamera();
      }

      function updateModelButtons() {
        const buttons = modelList.querySelectorAll(".modelBtn");
        buttons.forEach(function (btn) {
          if (btn.dataset.file === currentModelFile) {
            btn.classList.add("active");
          } else {
            btn.classList.remove("active");
          }
        });
      }

      function loadModel(file) {
        return new Promise(function (resolve, reject) {
          setLoading(true);
          setStatus(file + " を読み込み中...");
          currentModelFile = file;
          updateModelButtons();

          const loader = new THREE.OBJLoader();
          loader.load(
            "./" + file,
            function (object) {
              try {
                clearCurrentObject();
                applyMaterial(object);
                fitObject(object);
                scene.add(object);
                currentObject = object;
                setLoading(false);
                setStatus("表示中: " + file, "#79d98f");
                resolve();
              } catch (error) {
                setLoading(false);
                setStatus("モデル整形エラー: " + error.message, "#ff8484");
                reject(error);
              }
            },
            undefined,
            function (error) {
              setLoading(false);
              setStatus("読み込み失敗: " + file + " が見つからないか、アップロードされていません。", "#ff8484");
              reject(error);
            }
          );
        });
      }

      function buildModelList() {
        modelList.innerHTML = "";

        MODELS.forEach(function (model, index) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "modelBtn";
          btn.textContent = model.name + " (" + model.file + ")";
          btn.dataset.file = model.file;
          btn.addEventListener("click", async function () {
            if (!initDone) return;
            try {
              await loadModel(model.file);
            } catch (error) {
              console.error(error);
            }
          });
          modelList.appendChild(btn);

          if (index === 0) {
            currentModelFile = model.file;
          }
        });

        updateModelButtons();
      }

      async function openViewer() {
        unlockBtn.disabled = true;
        unlockBtn.textContent = "確認中...";
        gateMsg.textContent = "ボタンは反応しています";

        const input = normalizeInput(passwordInput.value);

        if (!input) {
          gateMsg.textContent = "パスワードを入力してください";
          unlockBtn.disabled = false;
          unlockBtn.textContent = "開く";
          return;
        }

        if (input !== PASSWORD) {
          gateMsg.textContent = "パスワードが違います";
          unlockBtn.disabled = false;
          unlockBtn.textContent = "開く";
          return;
        }

        gateMsg.textContent = "パスワードOK。ビューアを起動中...";
        setStatus("ビューアを起動中...");

        try {
          await ensureThreeLibs();
          initThree();
          buildModelList();
          modelPanel.style.display = "flex";

          if (MODELS.length > 0) {
            await loadModel(MODELS[0].file);
          } else {
            setStatus("モデル一覧が空です", "#ff8484");
          }

          sessionStorage.setItem("obj_viewer_unlocked", "1");
          gate.style.display = "none";
        } catch (error) {
          console.error(error);
          gateMsg.textContent = "起動に失敗しました\n" + error.message;
          setStatus("起動失敗: " + error.message, "#ff8484");
        } finally {
          unlockBtn.disabled = false;
          unlockBtn.textContent = "開く";
        }
      }

      function copyUrl() {
        if (!navigator.clipboard) {
          setStatus("URLコピーに未対応です", "#ff8484");
          return;
        }
        navigator.clipboard.writeText(location.href).then(function () {
          setStatus("URLをコピーしました", "#79d98f");
        }).catch(function () {
          setStatus("URLコピーに失敗しました", "#ff8484");
        });
      }

      unlockBtn.addEventListener("click", openViewer);

      passwordInput.addEventListener("keydown", function (event) {
        if (event.key === "Enter") openViewer();
      });

      resetBtn.addEventListener("click", function () {
        resetCamera();
        if (hintBubble) hintBubble.style.opacity = "0";
      });

      copyBtn.addEventListener("click", copyUrl);

      gateMsg.textContent = "待機中";
      modelPanel.style.display = "none";

      if (sessionStorage.getItem("obj_viewer_unlocked") === "1") {
        gateMsg.textContent = "前回の認証を引き継いでいます";
        openViewer();
      }
    })();
  </script>
</body>
</html>
