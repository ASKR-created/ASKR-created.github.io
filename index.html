<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OBJビューア</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #111; color: #fff; font-family: sans-serif; }
    #viewer { width: 100vw; height: 100vh; }
    #ui {
      position: absolute; left: 10px; right: 10px; bottom: 10px;
      background: rgba(0,0,0,0.6); padding: 10px; border-radius: 10px;
    }
    button { width: 100%; margin: 5px 0; padding: 10px; font-size: 16px; }
    #status { margin-top: 8px; color: #ffb3b3; white-space: pre-line; }
  </style>
</head>
<body>
  <div id="viewer"></div>
  <div id="ui">
    <div>モデル選択</div>
    <div id="modelList"></div>
    <div id="status"></div>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { OBJLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/OBJLoader.js";

    const MODELS = [
      { name: "モデル1", file: "model1.obj" },
      { name: "モデル2", file: "model2.obj" },
      { name: "モデル3", file: "model3.obj" }
    ];

    const status = document.getElementById("status");
    const modelList = document.getElementById("modelList");
    const viewer = document.getElementById("viewer");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 5000);
    camera.position.set(0, 50, 120);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    viewer.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0xffffff, 1.2));

    const dir = new THREE.DirectionalLight(0xffffff, 0.8);
    dir.position.set(100, 120, 80);
    scene.add(dir);

    let currentModel = null;

    function setStatus(text) {
      status.textContent = text;
    }

    function resetView() {
      camera.position.set(0, 50, 120);
      controls.target.set(0, 20, 0);
      controls.update();
    }

    function fitObject(object) {
      const box = new THREE.Box3().setFromObject(object);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);

      object.position.sub(center);

      const maxAxis = Math.max(size.x, size.y, size.z);
      if (maxAxis > 0) {
        const scale = 80 / maxAxis;
        object.scale.setScalar(scale);
      }

      const box2 = new THREE.Box3().setFromObject(object);
      const center2 = new THREE.Vector3();
      box2.getCenter(center2);

      object.position.x -= center2.x;
      object.position.y -= box2.min.y;
      object.position.z -= center2.z;

      resetView();
    }

    function applyMaterial(object) {
      object.traverse((child) => {
        if (child.isMesh) {
          child.material = new THREE.MeshNormalMaterial();
        }
      });
    }

    function loadModel(file) {
      setStatus("読み込み中: " + file);

      const loader = new OBJLoader();
      loader.load(
        "./" + file,
        (obj) => {
          if (currentModel) scene.remove(currentModel);
          applyMaterial(obj);
          fitObject(obj);
          scene.add(obj);
          currentModel = obj;
          setStatus("表示中: " + file);
        },
        undefined,
        () => {
          setStatus("読み込み失敗: " + file + "\nファイル名と配置を確認してください");
        }
      );
    }

    MODELS.forEach((m) => {
      const btn = document.createElement("button");
      btn.textContent = m.name + " (" + m.file + ")";
      btn.onclick = () => loadModel(m.file);
      modelList.appendChild(btn);
    });

    if (MODELS.length > 0) loadModel(MODELS[0].file);

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
