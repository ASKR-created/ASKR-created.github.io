<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>現在のARビューア</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    :root{
      --panel: rgba(20,24,31,0.62);
      --panel-strong: rgba(20,24,31,0.84);
      --panel-border: rgba(255,255,255,0.10);
      --text: #f4f6f8;
      --sub: #c7cfdb;
      --accent: #4ea1ff;
      --accent2: #2b78de;
      --danger: #ff8484;
      --ok: #79d98f;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html, body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:linear-gradient(180deg,#13161c,#1b2028);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
    }

    #app{
      position:relative;
      width:100%;
      height:100%;
      overflow:hidden;
    }

    model-viewer{
      width:100%;
      height:100%;
      background:transparent;
      --poster-color:transparent;
    }

    .panel{
      position:absolute;
      z-index:10;
      background:var(--panel);
      border:1px solid var(--panel-border);
      border-radius:16px;
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,0.18);
    }

    .panelHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:12px 14px;
      cursor:pointer;
      user-select:none;
    }

    .panelHeaderTitle{
      margin:0;
      font-size:13px;
      font-weight:800;
      color:#fff;
    }

    .toggleMark{
      font-size:12px;
      color:#fff;
      opacity:0.9;
      flex-shrink:0;
    }

    #topPanel{
      top:calc(10px + var(--safe-top));
      left:10px;
      right:10px;
    }

    #topPanelContent{
      padding:0 14px 12px 14px;
    }

    #title{
      margin:0 0 8px 0;
      font-size:17px;
      font-weight:800;
    }

    .label{
      margin:8px 0 2px 0;
      font-size:11px;
      font-weight:700;
      color:#ffffff;
    }

    .value{
      margin:0;
      font-size:12px;
      line-height:1.55;
      color:var(--sub);
      white-space:pre-line;
      word-break:break-word;
    }

    #status{
      margin-top:8px;
      font-size:11px;
      line-height:1.45;
      color:var(--sub);
    }

    #modelPanel{
      left:10px;
      right:10px;
      bottom:calc(118px + var(--safe-bottom));
      background:var(--panel-strong);
      max-height:34vh;
    }

    #modelPanelContent{
      padding:0 10px 10px 10px;
      max-height:calc(34vh - 44px);
      overflow:auto;
    }

    #modelList{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .modelBtn{
      width:100%;
      min-height:40px;
      border:none;
      border-radius:12px;
      color:#fff;
      font-size:13px;
      font-weight:700;
      text-align:left;
      padding:9px 11px;
      cursor:pointer;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.10);
      line-height:1.45;
    }

    .modelBtn.active{
      background:linear-gradient(180deg,var(--accent),var(--accent2));
      border-color:rgba(255,255,255,0.18);
    }

    .emptyBox{
      padding:14px 12px;
      border-radius:12px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      color:var(--sub);
      font-size:13px;
      line-height:1.7;
    }

    #bottomPanel{
      left:10px;
      right:10px;
      bottom:calc(10px + var(--safe-bottom));
      padding:10px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      align-items:center;
    }

    .btn{
      min-height:44px;
      border:none;
      border-radius:14px;
      color:#fff;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
      background:linear-gradient(180deg,var(--accent),var(--accent2));
    }

    .btn.sub{
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.10);
    }

    #errorBox{
      position:absolute;
      left:10px;
      right:10px;
      bottom:calc(232px + var(--safe-bottom));
      z-index:11;
      padding:12px 14px;
      border-radius:14px;
      background:rgba(90,20,20,0.78);
      border:1px solid rgba(255,255,255,0.10);
      color:#fff;
      display:none;
      font-size:13px;
      line-height:1.7;
      white-space:pre-line;
    }

    @media (min-width: 900px){
      #topPanel{
        left:16px;
        right:auto;
        width:340px;
        top:16px;
      }

      #modelPanel{
        left:auto;
        right:16px;
        width:300px;
        bottom:74px;
        max-height:260px;
      }

      #modelPanelContent{
        max-height:210px;
      }

      #bottomPanel{
        left:auto;
        right:16px;
        width:300px;
        bottom:16px;
      }

      #errorBox{
        left:auto;
        right:16px;
        width:300px;
        bottom:190px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <model-viewer
      id="mv"
      src=""
      alt="AR model"
      ar
      ar-modes="webxr scene-viewer quick-look"
      camera-controls
      touch-action="pan-y"
      shadow-intensity="1"
      exposure="1"
      environment-image="neutral"
      auto-rotate
      interaction-prompt="auto">
    </model-viewer>

    <div id="topPanel" class="panel">
      <div id="topPanelHeader" class="panelHeader">
        <div class="panelHeaderTitle">現在のARビューア</div>
        <div id="topToggleMark" class="toggleMark">▼</div>
      </div>

      <div id="topPanelContent">
        <div id="title">現在のARビューア</div>

        <div class="label">表示中のデータ</div>
        <div id="fileName" class="value">未選択</div>

        <div class="label">AR方式</div>
        <div id="arModeInfo" class="value">USDZは使用しません
GLB / GLTF のみでAR起動します</div>

        <div class="label">操作方法</div>
        <div class="value">ARで表示 を押すと、端末に応じた方式でARを開始します。
うまく起動しない場合は 3Dビューアに戻ってください。</div>

        <div id="status">準備中...</div>
      </div>
    </div>

    <div id="errorBox"></div>

    <div id="modelPanel" class="panel">
      <div id="modelPanelHeader" class="panelHeader">
        <div class="panelHeaderTitle">モデル情報</div>
        <div id="modelToggleMark" class="toggleMark">▼</div>
      </div>

      <div id="modelPanelContent">
        <div id="modelList"></div>
      </div>
    </div>

    <div id="bottomPanel" class="panel">
      <button id="arBtn" class="btn" type="button">ARで表示</button>
      <button id="backBtn" class="btn sub" type="button">3Dビューアへ</button>
    </div>
  </div>

  <script>
    const mv = document.getElementById("mv");
    const statusEl = document.getElementById("status");
    const errorBox = document.getElementById("errorBox");
    const arBtn = document.getElementById("arBtn");
    const backBtn = document.getElementById("backBtn");
    const fileNameEl = document.getElementById("fileName");
    const modelList = document.getElementById("modelList");

    const topPanelHeader = document.getElementById("topPanelHeader");
    const topPanelContent = document.getElementById("topPanelContent");
    const topToggleMark = document.getElementById("topToggleMark");

    const modelPanelHeader = document.getElementById("modelPanelHeader");
    const modelPanelContent = document.getElementById("modelPanelContent");
    const modelToggleMark = document.getElementById("modelToggleMark");

    let topPanelOpen = true;
    let modelPanelOpen = true;

    function getQueryFile() {
      const params = new URLSearchParams(location.search);
      return params.get("file") || "";
    }

    function absoluteUrl(path) {
      return new URL(path, location.origin + "/").href;
    }

    function setStatus(text, isError = false){
      statusEl.textContent = text;
      statusEl.style.color = isError ? "#ff8484" : "#79d98f";
    }

    function showError(text){
      errorBox.style.display = "block";
      errorBox.textContent = text;
      setStatus("読み込み失敗", true);
    }

    function hideError(){
      errorBox.style.display = "none";
      errorBox.textContent = "";
    }

    function applyPanelState() {
      topPanelContent.style.display = topPanelOpen ? "block" : "none";
      modelPanelContent.style.display = modelPanelOpen ? "block" : "block";
      modelPanelContent.style.display = modelPanelOpen ? "block" : "none";
      topToggleMark.textContent = topPanelOpen ? "▼" : "▶";
      modelToggleMark.textContent = modelPanelOpen ? "▼" : "▶";
    }

    function setInitialPanelState() {
      if (window.innerWidth >= 900) {
        topPanelOpen = true;
        modelPanelOpen = true;
      } else {
        topPanelOpen = false;
        modelPanelOpen = false;
      }
      applyPanelState();
    }

    function toggleTopPanel() {
      topPanelOpen = !topPanelOpen;
      applyPanelState();
    }

    function toggleModelPanel() {
      modelPanelOpen = !modelPanelOpen;
      applyPanelState();
    }

    function buildModelInfo(currentFile) {
      modelList.innerHTML = "";

      if (!currentFile) {
        const empty = document.createElement("div");
        empty.className = "emptyBox";
        empty.textContent = "AR用データが指定されていません";
        modelList.appendChild(empty);
        return;
      }

      const box = document.createElement("div");
      box.className = "emptyBox";
      box.textContent =
        "現在読み込み中:\n" + currentFile + "\n\n" +
        "対応形式:\nGLB / GLTF";
      modelList.appendChild(box);
    }

    async function setupViewer() {
      const currentFile = getQueryFile();

      if (!currentFile) {
        fileNameEl.textContent = "未選択";
        buildModelInfo("");
        setStatus("AR用データが指定されていません。", true);
        return;
      }

      fileNameEl.textContent = currentFile;
      buildModelInfo(currentFile);
      mv.src = absoluteUrl(currentFile);
      setStatus("モデル読込準備完了");
    }

    mv.addEventListener("load", () => {
      hideError();
      setStatus("読み込み完了");
    });

    mv.addEventListener("error", () => {
      const currentFile = getQueryFile();
      showError(currentFile + " の読み込みに失敗しました。");
    });

    arBtn.addEventListener("click", async () => {
      try{
        const currentFile = getQueryFile();

        if (!currentFile) {
          showError("AR用データが指定されていません。");
          return;
        }

        if (typeof mv.activateAR === "function") {
          setStatus("AR起動中...");
          await mv.activateAR();
        } else {
          showError("この端末ではAR起動に対応していません。");
        }
      } catch (e){
        showError("ARを開始できませんでした。\nこの端末では3D表示のみ利用できる可能性があります。");
      }
    });

    backBtn.addEventListener("click", () => {
      window.location.href = location.origin + "/index.html";
    });

    topPanelHeader.addEventListener("click", toggleTopPanel);
    modelPanelHeader.addEventListener("click", toggleModelPanel);

    setInitialPanelState();
    setupViewer();
  </script>
</body>
</html>
