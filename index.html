<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>3Dビューア</title>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    :root{
      --panel: rgba(20,24,31,0.58);
      --panel-strong: rgba(20,24,31,0.84);
      --panel-border: rgba(255,255,255,0.10);
      --text: #f4f6f8;
      --sub: #c7cfdb;
      --accent: #4ea1ff;
      --accent2: #2b78de;
      --ok: #79d98f;
      --danger: #ff8484;
      --shadow: 0 10px 30px rgba(0,0,0,0.18);
      --radius: 16px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html, body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:transparent;
      color:var(--text);
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
    }

    body{
      overscroll-behavior:none;
    }

    #app{
      position:relative;
      width:100%;
      height:100%;
      overflow:hidden;
      background:transparent;
    }

    #viewer{
      position:absolute;
      inset:0;
      display:block;
      background:transparent;
    }

    canvas{
      display:block;
      width:100%;
      height:100%;
      touch-action:none;
      background:transparent !important;
    }

    .panel{
      position:absolute;
      z-index:20;
      background:var(--panel);
      border:1px solid var(--panel-border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      overflow:hidden;
    }

    .panelHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      cursor:pointer;
      user-select:none;
    }

    .panelHeaderTitle{
      font-size:13px;
      font-weight:800;
      color:#fff;
      margin:0;
    }

    .toggleMark{
      font-size:12px;
      color:#fff;
      opacity:0.9;
      flex-shrink:0;
    }

    #topPanel{
      top:calc(10px + var(--safe-top));
      left:10px;
      right:10px;
      padding:12px 14px;
    }

    #topPanelContent{
      margin-top:8px;
    }

    #title{
      margin:0 0 8px 0;
      font-size:17px;
      font-weight:800;
      line-height:1.35;
    }

    .label{
      margin:8px 0 2px 0;
      font-size:11px;
      font-weight:700;
      color:#ffffff;
      opacity:0.95;
    }

    .value{
      margin:0;
      font-size:12px;
      line-height:1.55;
      color:var(--sub);
      word-break:break-word;
      white-space:pre-line;
    }

    #currentData{
      color:var(--ok);
      font-weight:700;
    }

    #status{
      margin-top:8px;
      font-size:11px;
      line-height:1.45;
      color:var(--sub);
      white-space:pre-line;
      word-break:break-word;
    }

    #hintBubble{
      position:absolute;
      right:10px;
      top:calc(132px + var(--safe-top));
      z-index:18;
      padding:8px 10px;
      border-radius:14px;
      background:rgba(0,0,0,0.18);
      border:1px solid rgba(255,255,255,0.10);
      font-size:11px;
      line-height:1.5;
      color:#eef3fb;
      max-width:170px;
      pointer-events:none;
      opacity:1;
      transition:opacity 0.4s ease;
    }

    #loading{
      position:absolute;
      left:50%;
      bottom:calc(110px + var(--safe-bottom));
      transform:translateX(-50%);
      z-index:25;
      padding:8px 14px;
      border-radius:999px;
      font-size:11px;
      background:rgba(0,0,0,0.52);
      border:1px solid rgba(255,255,255,0.14);
      display:none;
      white-space:nowrap;
    }

    #modelPanel{
      z-index:22;
      left:10px;
      right:10px;
      bottom:calc(118px + var(--safe-bottom));
      padding:10px;
      max-height:32vh;
      overflow:auto;
      background:var(--panel-strong);
    }

    #modelPanelContent{
      margin-top:8px;
      max-height:calc(32vh - 34px);
      overflow:auto;
    }

    #modelList{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .modelBtn{
      width:100%;
      min-height:40px;
      border:none;
      border-radius:12px;
      color:#fff;
      font-size:14px;
      font-weight:700;
      text-align:left;
      padding:9px 11px;
      cursor:pointer;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.10);
    }

    .modelBtn.active{
      background:linear-gradient(180deg,var(--accent),var(--accent2));
      border-color:rgba(255,255,255,0.18);
    }

    .emptyBox{
      padding:14px 12px;
      border-radius:12px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      color:var(--sub);
      font-size:13px;
      line-height:1.7;
    }

    #uiBar{
      position:absolute;
      z-index:23;
      left:10px;
      right:10px;
      bottom:calc(10px + var(--safe-bottom));
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
      align-items:center;
    }

    .btn{
      min-height:46px;
      border:none;
      border-radius:14px;
      color:#fff;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
      background:linear-gradient(180deg,var(--accent),var(--accent2));
      box-shadow:0 6px 16px rgba(43,120,222,0.20);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
    }

    .btn.sub{
      background:rgba(20,24,31,0.64);
      border:1px solid rgba(255,255,255,0.10);
      box-shadow:none;
    }

    .btn:disabled{
      opacity:0.45;
      cursor:default;
    }

    .btn:active,
    .modelBtn:active,
    #unlockBtn:active{
      transform:scale(0.985);
    }

    #gate{
      position:fixed;
      inset:0;
      z-index:60;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px 14px;
      background:rgba(0,0,0,0.52);
    }

    #gateCard{
      width:100%;
      max-width:420px;
      background:rgba(18,22,28,0.94);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:20px;
      box-shadow:0 20px 44px rgba(0,0,0,0.42);
      padding:20px 16px 16px;
    }

    #gateTitle{
      margin:0 0 10px 0;
      font-size:22px;
      line-height:1.4;
      font-weight:800;
    }

    #gateText{
      margin:0;
      font-size:14px;
      line-height:1.8;
      color:var(--sub);
    }

    .field{
      margin-top:14px;
    }

    .field label{
      display:block;
      margin-bottom:7px;
      font-size:13px;
      color:var(--sub);
    }

    .field input{
      width:100%;
      height:50px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.14);
      background:rgba(255,255,255,0.06);
      color:#fff;
      font-size:16px;
      padding:0 14px;
      outline:none;
    }

    .field input:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(78,161,255,0.18);
    }

    #unlockBtn{
      width:100%;
      height:50px;
      margin-top:14px;
      border:none;
      border-radius:14px;
      font-size:16px;
      font-weight:800;
      color:#fff;
      background:linear-gradient(180deg,var(--accent),var(--accent2));
      cursor:pointer;
    }

    #gateMsg{
      min-height:22px;
      margin-top:10px;
      font-size:13px;
      color:var(--danger);
      line-height:1.6;
      white-space:pre-line;
    }

    #arProxy{
      position:fixed;
      left:-9999px;
      top:-9999px;
      width:1px;
      height:1px;
      opacity:0;
      pointer-events:none;
    }

    @media (max-width: 899px) and (orientation: landscape){
      #topPanel{
        left:10px;
        right:auto;
        width:280px;
        top:10px;
        padding:10px 12px;
      }

      #title{
        font-size:15px;
        margin-bottom:6px;
      }

      .label{
        font-size:10px;
        margin-top:6px;
      }

      .value, #status{
        font-size:11px;
        line-height:1.4;
      }

      #hintBubble{
        top:auto;
        right:12px;
        bottom:114px;
        max-width:160px;
      }

      #modelPanel{
        left:auto;
        right:10px;
        width:250px;
        bottom:114px;
        max-height:40vh;
      }

      #modelPanelContent{
        max-height:calc(40vh - 34px);
      }

      #uiBar{
        left:auto;
        right:10px;
        width:250px;
        grid-template-columns: 1fr 1fr;
        bottom:10px;
      }

      .btn{
        min-height:38px;
        font-size:12px;
        border-radius:12px;
      }
    }

    @media (min-width: 900px){
      #topPanel{
        left:16px;
        top:16px;
        right:auto;
        width:320px;
        padding:12px 14px;
      }

      #hintBubble{
        right:16px;
        top:16px;
        max-width:170px;
      }

      #modelPanel{
        left:auto;
        right:16px;
        width:270px;
        bottom:70px;
        max-height:260px;
      }

      #modelPanelContent{
        max-height:200px;
      }

      #uiBar{
        left:auto;
        right:16px;
        width:270px;
        bottom:16px;
        grid-template-columns: 1fr 1fr;
      }

      .btn{
        min-height:40px;
        font-size:12px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="viewer"></div>

    <div id="gate">
      <div id="gateCard">
        <h1 id="gateTitle">閲覧用パスワード</h1>
        <p id="gateText">共有されたパスワードを入力すると、モデル一覧を表示します。</p>

        <div class="field">
          <label for="passwordInput">パスワード</label>
          <input
            id="passwordInput"
            type="password"
            placeholder="パスワードを入力"
            autocomplete="off"
            autocapitalize="off"
            autocorrect="off"
            spellcheck="false"
          >
        </div>

        <button id="unlockBtn" type="button">開く</button>
        <div id="gateMsg"></div>
      </div>
    </div>

    <div id="topPanel" class="panel">
      <div id="topPanelHeader" class="panelHeader">
        <div class="panelHeaderTitle">3Dビューア</div>
        <div id="topToggleMark" class="toggleMark">▼</div>
      </div>

      <div id="topPanelContent">
        <div class="label">表示中のデータ</div>
        <div id="currentData" class="value">未選択</div>

        <div class="label">操作方法</div>
        <div class="value">1本指で回転 / 2本指で移動・拡大縮小</div>

        <div id="status">待機中...</div>
      </div>
    </div>

    <div id="hintBubble">モデルを指で動かせます</div>

    <div id="modelPanel" class="panel">
      <div id="modelPanelHeader" class="panelHeader">
        <div class="panelHeaderTitle">モデル一覧</div>
        <div id="modelToggleMark" class="toggleMark">▼</div>
      </div>

      <div id="modelPanelContent">
        <div id="modelList"></div>
      </div>
    </div>

    <div id="uiBar">
      <button id="arBtn" class="btn sub" type="button">AR切替</button>
      <button id="resetBtn" class="btn" type="button">視点リセット</button>
    </div>

    <div id="loading">モデルを読み込み中...</div>

    <model-viewer
      id="arProxy"
      src=""
      alt="AR proxy"
      ar
      ar-modes="webxr scene-viewer quick-look"
      camera-controls
      ios-src="">
    </model-viewer>
  </div>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { OBJLoader } from "three/addons/loaders/OBJLoader.js";

    const PASSWORD = "p001";
    const API_URL = "https://api.github.com/repos/ASKR-created/ASKR-created.github.io/contents";

    const viewer = document.getElementById("viewer");
    const gate = document.getElementById("gate");
    const passwordInput = document.getElementById("passwordInput");
    const unlockBtn = document.getElementById("unlockBtn");
    const gateMsg = document.getElementById("gateMsg");

    const statusEl = document.getElementById("status");
    const currentDataEl = document.getElementById("currentData");
    const loadingEl = document.getElementById("loading");
    const resetBtn = document.getElementById("resetBtn");
    const arBtn = document.getElementById("arBtn");
    const hintBubble = document.getElementById("hintBubble");
    const modelList = document.getElementById("modelList");
    const arProxy = document.getElementById("arProxy");

    const topPanelContent = document.getElementById("topPanelContent");
    const modelPanelContent = document.getElementById("modelPanelContent");
    const topPanelHeader = document.getElementById("topPanelHeader");
    const modelPanelHeader = document.getElementById("modelPanelHeader");
    const topToggleMark = document.getElementById("topToggleMark");
    const modelToggleMark = document.getElementById("modelToggleMark");

    let scene = null;
    let camera = null;
    let renderer = null;
    let controls = null;
    let currentObject = null;
    let currentModelFile = "";
    let hintTimer = null;
    let modelFiles = [];
    let viewerReady = false;

    let topPanelOpen = true;
    let modelPanelOpen = true;

    function setStatus(text, color = "") {
      statusEl.textContent = text;
      statusEl.style.color = color || "";
    }

    function setCurrentData(text, color = "") {
      currentDataEl.textContent = text;
      currentDataEl.style.color = color || "";
    }

    function setLoading(flag) {
      loadingEl.style.display = flag ? "block" : "none";
    }

    function hideHintSoon() {
      if (hintTimer) clearTimeout(hintTimer);
      hintTimer = setTimeout(() => {
        if (hintBubble) hintBubble.style.opacity = "0";
      }, 2600);
    }

    function normalizeInput(value) {
      return value.replace(/ｐ/g, "p").replace(/Ｐ/g, "P").trim();
    }

    function applyPanelState() {
      topPanelContent.style.display = topPanelOpen ? "block" : "none";
      modelPanelContent.style.display = modelPanelOpen ? "block" : "none";
      topToggleMark.textContent = topPanelOpen ? "▼" : "▶";
      modelToggleMark.textContent = modelPanelOpen ? "▼" : "▶";
    }

    function setInitialPanelState() {
      if (window.innerWidth >= 900) {
        topPanelOpen = true;
        modelPanelOpen = true;
      } else {
        topPanelOpen = false;
        modelPanelOpen = false;
      }
      applyPanelState();
    }

    function toggleTopPanel() {
      topPanelOpen = !topPanelOpen;
      applyPanelState();
    }

    function toggleModelPanel() {
      modelPanelOpen = !modelPanelOpen;
      applyPanelState();
    }

    async function fetchObjFilesFromGitHub() {
      const response = await fetch(API_URL, {
        headers: { "Accept": "application/vnd.github+json" }
      });

      if (!response.ok) {
        throw new Error(`GitHub API エラー: ${response.status}`);
      }

      const items = await response.json();

      return items
        .filter((item) => item.type === "file" && /\.obj$/i.test(item.name))
        .map((item) => item.name)
        .sort((a, b) => a.localeCompare(b, "ja"));
    }

    async function fetchGlbFilesFromGitHub() {
      const response = await fetch(API_URL, {
        headers: { "Accept": "application/vnd.github+json" }
      });

      if (!response.ok) {
        throw new Error(`GitHub API エラー: ${response.status}`);
      }

      const items = await response.json();

      return items
        .filter((item) => item.type === "file" && /\.glb$/i.test(item.name))
        .map((item) => item.name);
    }

    function initThree() {
      if (viewerReady) return;

      scene = new THREE.Scene();

      camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        5000
      );
      camera.position.set(0, 55, 145);

      renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setClearColor(0x000000, 0);
      viewer.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.screenSpacePanning = true;
      controls.enablePan = true;
      controls.enableZoom = true;
      controls.enableRotate = true;
      controls.minDistance = 30;
      controls.maxDistance = 320;
      controls.target.set(0, 24, 0);
      controls.update();

      controls.addEventListener("start", () => {
        if (hintBubble) hintBubble.style.opacity = "0";
      });

      const ambient = new THREE.AmbientLight(0xffffff, 1.45);
      scene.add(ambient);

      const dir1 = new THREE.DirectionalLight(0xffffff, 1.1);
      dir1.position.set(120, 180, 120);
      scene.add(dir1);

      const dir2 = new THREE.DirectionalLight(0xffffff, 0.45);
      dir2.position.set(-100, 60, -80);
      scene.add(dir2);

      window.addEventListener("resize", onResize, { passive: true });

      hideHintSoon();
      animate();
      viewerReady = true;
    }

    function onResize() {
      if (!camera || !renderer) return;
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      if (controls) controls.update();
      if (renderer && scene && camera) {
        renderer.render(scene, camera);
      }
    }

    function clearCurrentObject() {
      if (!currentObject) return;

      scene.remove(currentObject);

      currentObject.traverse((child) => {
        if (child.isMesh) {
          if (child.geometry) child.geometry.dispose();
          if (child.material) {
            if (Array.isArray(child.material)) {
              child.material.forEach((m) => m.dispose());
            } else {
              child.material.dispose();
            }
          }
        }
      });

      currentObject = null;
    }

    function applyMaterial(object) {
      object.traverse((child) => {
        if (child.isMesh) {
          child.material = new THREE.MeshStandardMaterial({
            color: 0xd9dde4,
            roughness: 0.84,
            metalness: 0.03,
            transparent: true,
            opacity: 1.0
          });
        }
      });
    }

    function resetCamera() {
      if (!camera || !controls) return;
      camera.position.set(0, 55, 145);
      controls.target.set(0, 24, 0);
      controls.update();
    }

    function fitObject(object) {
      const box = new THREE.Box3().setFromObject(object);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();

      box.getSize(size);
      box.getCenter(center);
      object.position.sub(center);

      const maxAxis = Math.max(size.x, size.y, size.z);
      if (maxAxis > 0) {
        const scale = 88 / maxAxis;
        object.scale.setScalar(scale);
      }

      const box2 = new THREE.Box3().setFromObject(object);
      const center2 = new THREE.Vector3();
      box2.getCenter(center2);

      object.position.x -= center2.x;
      object.position.y -= box2.min.y;
      object.position.z -= center2.z;

      resetCamera();
    }

    function updateModelButtons() {
      const buttons = modelList.querySelectorAll(".modelBtn");
      buttons.forEach((btn) => {
        if (btn.dataset.file === currentModelFile) {
          btn.classList.add("active");
        } else {
          btn.classList.remove("active");
        }
      });
    }

    async function loadModel(file) {
      setLoading(true);
      setStatus(file + " を読み込み中...");
      currentModelFile = file;
      updateModelButtons();
      setCurrentData(file, "#79d98f");
      updateArButtonState();

      return new Promise((resolve, reject) => {
        const loader = new OBJLoader();

        loader.load(
          "./" + file,
          (object) => {
            try {
              clearCurrentObject();
              applyMaterial(object);
              fitObject(object);
              scene.add(object);
              currentObject = object;
              setLoading(false);
              setStatus("読み込み完了", "#79d98f");
              resolve();
            } catch (error) {
              console.error(error);
              setLoading(false);
              setStatus("モデル整形エラー: " + error.message, "#ff8484");
              reject(error);
            }
          },
          undefined,
          (error) => {
            console.error(error);
            setLoading(false);
            setStatus("読み込み失敗: " + file + "\nファイル名やアップロード先を確認してください。", "#ff8484");
            reject(error);
          }
        );
      });
    }

    function buildModelList(files) {
      modelList.innerHTML = "";

      if (!files.length) {
        const empty = document.createElement("div");
        empty.className = "emptyBox";
        empty.textContent = "モデルデータはありません";
        modelList.appendChild(empty);
        setCurrentData("モデルデータはありません", "#ff8484");
        arBtn.disabled = true;
        return;
      }

      files.forEach((file) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "modelBtn";
        btn.textContent = file;
        btn.dataset.file = file;

        btn.addEventListener("click", async () => {
          try {
            await loadModel(file);
            if (window.innerWidth < 900) {
              modelPanelOpen = false;
              applyPanelState();
            }
          } catch (error) {
            console.error(error);
          }
        });

        modelList.appendChild(btn);
      });

      updateModelButtons();
      updateArButtonState();
    }

    function getArFileFromCurrentObj() {
      if (!currentModelFile) return "";
      return currentModelFile.replace(/\.obj$/i, ".glb");
    }

    function getUsdzFileFromCurrentObj() {
      if (!currentModelFile) return "";
      return currentModelFile.replace(/\.obj$/i, ".usdz");
    }

    function updateArButtonState() {
      const enabled = !!currentModelFile;
      arBtn.disabled = !enabled;
    }

    async function openArSmooth() {
      if (!currentModelFile) {
        setStatus("表示中のOBJがありません", "#ff8484");
        return;
      }

      const glbFile = getArFileFromCurrentObj();
      const usdzFile = getUsdzFileFromCurrentObj();

      try {
        setStatus("AR準備中...", "#79d98f");
        setLoading(true);

        const glbFiles = await fetchGlbFilesFromGitHub();
        if (!glbFiles.includes(glbFile)) {
          setLoading(false);
          setStatus("対応するGLBがありません: " + glbFile, "#ff8484");
          return;
        }

        arProxy.setAttribute("src", glbFile);
        arProxy.setAttribute("ios-src", usdzFile);

        if (typeof arProxy.activateAR === "function") {
          await arProxy.activateAR();
          setStatus("ARを開始しました", "#79d98f");
        } else {
          setStatus("この端末ではAR起動に対応していません", "#ff8484");
        }
      } catch (error) {
        console.error(error);
        setStatus("AR起動に失敗しました", "#ff8484");
      } finally {
        setLoading(false);
      }
    }

    async function unlockViewer(forceOpen = false) {
      unlockBtn.disabled = true;
      unlockBtn.textContent = "確認中...";
      gateMsg.textContent = "";

      const input = normalizeInput(passwordInput.value);

      if (!input) {
        gateMsg.textContent = "パスワードを入力してください";
        unlockBtn.disabled = false;
        unlockBtn.textContent = "開く";
        return;
      }

      if (input !== PASSWORD) {
        gateMsg.textContent = "パスワードが違います";
        unlockBtn.disabled = false;
        unlockBtn.textContent = "開く";
        return;
      }

      try {
        setStatus("モデル一覧を確認中...");
        initThree();

        modelFiles = await fetchObjFilesFromGitHub();
        buildModelList(modelFiles);

        if (modelFiles.length === 0) {
          setStatus("モデルデータはありません", "#ff8484");
        } else {
          setStatus("モデルデータを検出しました: " + modelFiles.length + "件", "#79d98f");

          const savedObj = sessionStorage.getItem("last_obj_file");
          if (savedObj && modelFiles.includes(savedObj)) {
            await loadModel(savedObj);
          }
        }

        sessionStorage.setItem("obj_viewer_unlocked", "1");
        gate.style.display = "none";

        if (!forceOpen) {
          setInitialPanelState();
        }
      } catch (error) {
        console.error(error);
        gateMsg.textContent = "起動に失敗しました";
        setStatus("起動に失敗しました\n" + error.message, "#ff8484");
      } finally {
        unlockBtn.disabled = false;
        unlockBtn.textContent = "開く";
      }
    }

    topPanelHeader.addEventListener("click", toggleTopPanel);
    modelPanelHeader.addEventListener("click", toggleModelPanel);

    unlockBtn.addEventListener("click", () => unlockViewer(false));

    passwordInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        unlockViewer(false);
      }
    });

    resetBtn.addEventListener("click", () => {
      resetCamera();
      if (hintBubble) hintBubble.style.opacity = "0";
    });

    arBtn.addEventListener("click", openArSmooth);

    setInitialPanelState();

    if (sessionStorage.getItem("obj_viewer_unlocked") === "1") {
      passwordInput.value = PASSWORD;
      unlockViewer(true);
      gate.style.display = "none";
    }
  </script>
</body>
</html>
