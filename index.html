<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3Dビューア</title>
</head>

<body style="margin:0;background:#111;color:white;font-family:sans-serif">

<h2>3Dビューア</h2>

<input type="password" id="pass" placeholder="パスワード">
<button onclick="unlock()">開く</button>

<div id="main" style="display:none">

<h3>モデル一覧</h3>
<div id="list"></div>

<button onclick="openAR()">AR表示</button>

</div>

<script>
const PASSWORD = "p001";
let currentFile = "";

function unlock(){
    const val = document.getElementById("pass").value;
    if(val === PASSWORD){
        document.getElementById("main").style.display = "block";
        loadModels();
    }else{
        alert("パスワードが違います");
    }
}

async function loadModels(){
    const res = await fetch("https://api.github.com/repos/ASKR-created/ASKR-created.github.io/git/trees/main?recursive=1");
    const data = await res.json();

    const files = data.tree
        .map(v=>v.path)
        .filter(v=>v.startsWith("models/"))
        .filter(v=>v.endsWith(".glb") || v.endsWith(".gltf") || v.endsWith(".obj") || v.endsWith(".fbx"));

    const list = document.getElementById("list");
    list.innerHTML = "";

    files.forEach(f=>{
        const btn = document.createElement("button");
        btn.innerText = f;
        btn.style.display = "block";
        btn.onclick = ()=>{
            currentFile = f;
            alert("選択：" + f);
        };
        list.appendChild(btn);
    });
}

function getARFile(){
    if(!currentFile) return "";

    if(currentFile.endsWith(".glb") || currentFile.endsWith(".gltf")){
        return currentFile;
    }

    return currentFile.replace(/\.\w+$/, ".glb");
}

function openAR(){
    const file = getARFile();
    if(!file){
        alert("モデル未選択");
        return;
    }
    location.href = "ar.html?file=" + encodeURIComponent(file);
}
</script>

</body>
</html>
