<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBJビューア</title>

<style>
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:sans-serif;
}

#viewer{
  width:100vw;
  height:100vh;
}

#ui{
  position:absolute;
  bottom:10px;
  left:10px;
  right:10px;
  background:rgba(0,0,0,0.6);
  padding:10px;
  border-radius:10px;
}

button{
  width:100%;
  margin:5px 0;
  padding:10px;
  font-size:16px;
}
</style>
</head>

<body>

<div id="viewer"></div>

<div id="ui">
  <div>モデル選択</div>
  <div id="modelList"></div>
</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://unpkg.com/three@0.160.0/examples/js/loaders/OBJLoader.js"></script>

<script>

const MODELS = [
  {name:"モデル1", file:"model1.obj"},
  {name:"モデル2", file:"model2.obj"},
  {name:"モデル3", file:"model3.obj"}
];

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);

let camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,50,100);

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById("viewer").appendChild(renderer.domElement);

let controls = new THREE.OrbitControls(camera, renderer.domElement);

let light = new THREE.AmbientLight(0xffffff,1);
scene.add(light);

let currentModel = null;

function loadModel(file){

  let loader = new THREE.OBJLoader();

  loader.load(
    file,
    function(obj){

      if(currentModel){
        scene.remove(currentModel);
      }

      obj.traverse(c=>{
        if(c.isMesh){
          c.material = new THREE.MeshNormalMaterial();
        }
      });

      scene.add(obj);
      currentModel = obj;

    },
    undefined,
    function(){
      alert("読み込み失敗: " + file);
    }
  );
}

function buildUI(){

  let list = document.getElementById("modelList");

  MODELS.forEach(m=>{

    let btn = document.createElement("button");
    btn.textContent = m.name;

    btn.onclick = ()=> loadModel(m.file);

    list.appendChild(btn);

  });

}

buildUI();

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene,camera);
}

animate();

window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
