<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OBJ共有ビューア</title>
  <style>
    :root{
      --bg:#1e1f22;
      --panel:rgba(32,34,37,0.88);
      --panel-border:rgba(255,255,255,0.12);
      --text:#f2f2f2;
      --sub:#c8c8c8;
      --accent:#4ea1ff;
      --accent2:#2d7de0;
      --danger:#ff7b7b;
      --ok:#77d98b;
    }

    *{
      box-sizing:border-box;
    }

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:var(--bg);
      color:var(--text);
      font-family:Arial, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
    }

    #app{
      position:relative;
      width:100%;
      height:100%;
    }

    canvas{
      display:block;
    }

    .panel{
      position:absolute;
      z-index:20;
      background:var(--panel);
      border:1px solid var(--panel-border);
      border-radius:12px;
      box-shadow:0 8px 24px rgba(0,0,0,0.35);
      backdrop-filter:blur(8px);
    }

    #infoPanel{
      top:12px;
      left:12px;
      width:min(360px, calc(100vw - 24px));
      padding:14px;
    }

    #infoPanel h1{
      margin:0 0 8px 0;
      font-size:18px;
      line-height:1.4;
    }

    #infoPanel p{
      margin:0 0 8px 0;
      font-size:13px;
      color:var(--sub);
      line-height:1.7;
    }

    #status{
      margin-top:10px;
      font-size:13px;
      line-height:1.6;
      color:var(--sub);
      word-break:break-word;
    }

    .btnRow{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }

    button{
      appearance:none;
      border:none;
      border-radius:10px;
      padding:10px 14px;
      font-size:13px;
      font-weight:bold;
      color:#fff;
      cursor:pointer;
      background:linear-gradient(180deg,var(--accent),var(--accent2));
    }

    button.sub{
      background:rgba(255,255,255,0.10);
      border:1px solid rgba(255,255,255,0.12);
    }

    button:hover{
      filter:brightness(1.06);
    }

    #qrPanel{
      top:12px;
      right:12px;
      width:220px;
      padding:14px;
      text-align:center;
    }

    #qrPanel h2{
      margin:0 0 10px 0;
      font-size:15px;
    }

    #qrArea{
      background:#fff;
      border-radius:10px;
      padding:10px;
      min-height:180px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    #qrCaption{
      margin-top:8px;
      font-size:11px;
      color:var(--sub);
      line-height:1.6;
      word-break:break-all;
    }

    #loading{
      position:absolute;
      z-index:25;
      left:50%;
      bottom:14px;
      transform:translateX(-50%);
      padding:10px 14px;
      border-radius:999px;
      background:rgba(0,0,0,0.58);
      border:1px solid rgba(255,255,255,0.14);
      font-size:13px;
      display:none;
    }

    #gate{
      position:fixed;
      inset:0;
      z-index:50;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
      background:rgba(0,0,0,0.58);
    }

    #gateCard{
      width:min(420px,100%);
      background:rgba(22,24,28,0.96);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:16px;
      box-shadow:0 16px 40px rgba(0,0,0,0.45);
      padding:20px;
    }

    #gateCard h2{
      margin:0 0 10px 0;
      font-size:22px;
    }

    #gateCard p{
      margin:0 0 10px 0;
      font-size:14px;
      color:var(--sub);
      line-height:1.7;
    }

    .field{
      margin-top:12px;
    }

    .field label{
      display:block;
      margin-bottom:6px;
      font-size:13px;
      color:var(--sub);
    }

    .field input{
      width:100%;
      height:44px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.14);
      background:rgba(255,255,255,0.06);
      color:#fff;
      padding:0 12px;
      font-size:15px;
      outline:none;
    }

    .field input:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(78,161,255,0.16);
    }

    #gateMsg{
      min-height:22px;
      margin-top:10px;
      font-size:13px;
      color:var(--danger);
    }

    .note{
      margin-top:10px;
      padding:10px;
      border-radius:10px;
      font-size:12px;
      line-height:1.6;
      color:#ffd38a;
      background:rgba(255,211,138,0.08);
      border:1px solid rgba(255,211,138,0.16);
    }

    @media (max-width: 700px){
      #qrPanel{
        display:none;
      }

      #infoPanel{
        width:calc(100vw - 24px);
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="gate">
      <div id="gateCard">
        <h2>閲覧用パスワード</h2>
        <p>共有されたパスワードを入力するとOBJモデルを表示します。</p>

        <div class="field">
          <label for="passwordInput">パスワード</label>
          <input id="passwordInput" type="password" placeholder="パスワードを入力" />
        </div>

        <div class="btnRow">
          <button id="unlockBtn">開く</button>
        </div>

        <div id="gateMsg"></div>

        <div class="note">
          この方式は簡易ロックです。GitHub Pages の静的HTMLだけでは、
          本格的な安全認証にはなりません。
        </div>
      </div>
    </div>

    <div id="infoPanel" class="panel">
      <h1>OBJ共有ビューア</h1>
      <p>
        左ドラッグ: 回転 / 右ドラッグ: 移動 / ホイール: 拡大縮小<br>
        スマホでは指で回転、ピンチで拡大縮小できます。
      </p>
      <p>
        読み込みファイル名: <strong>model.obj</strong>
      </p>

      <div class="btnRow">
        <button id="resetBtn">視点リセット</button>
        <button id="copyBtn" class="sub">URLコピー</button>
      </div>

      <div id="status">待機中</div>
    </div>

    <div id="qrPanel" class="panel">
      <h2>共有QRコード</h2>
      <div id="qrArea"></div>
      <div id="qrCaption"></div>
    </div>

    <div id="loading">モデルを読み込み中...</div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { OBJLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/OBJLoader.js";
    import QRCode from "https://cdn.jsdelivr.net/npm/qrcode@1.5.3/+esm";

    // =========================
    // 設定
    // =========================

    // GitHubに一緒に置くOBJファイル名
    const MODEL_URL = "./model.obj";

    // 初期パスワードは demo1234
    // 下のハッシュは "demo1234" の SHA-256
    const PASSWORD_HASH = "34d67b96be8ad9a4a6ec1f4b7f944e4f2c2f7b0d1d4d2c2a7f9d7c7c6d5b5cf5";

    // =========================
    // DOM
    // =========================
    const app = document.getElementById("app");
    const gate = document.getElementById("gate");
    const passwordInput = document.getElementById("passwordInput");
    const unlockBtn = document.getElementById("unlockBtn");
    const gateMsg = document.getElementById("gateMsg");

    const statusEl = document.getElementById("status");
    const loadingEl = document.getElementById("loading");
    const resetBtn = document.getElementById("resetBtn");
    const copyBtn = document.getElementById("copyBtn");

    const qrArea = document.getElementById("qrArea");
    const qrCaption = document.getElementById("qrCaption");

    // =========================
    // Three.js
    // =========================
    let scene = null;
    let camera = null;
    let renderer = null;
    let controls = null;
    let currentObject = null;

    function setStatus(text, color = "") {
      statusEl.textContent = text;
      statusEl.style.color = color || "";
    }

    function setLoading(flag) {
      loadingEl.style.display = flag ? "block" : "none";
    }

    function initThree() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x1e1f22);

      camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        5000
      );
      camera.position.set(0, 80, 180);

      renderer = new THREE.WebGLRenderer({
        antialias: true
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      app.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.target.set(0, 30, 0);
      controls.update();

      const ambient = new THREE.AmbientLight(0xffffff, 1.35);
      scene.add(ambient);

      const dir1 = new THREE.DirectionalLight(0xffffff, 1.1);
      dir1.position.set(120, 180, 100);
      scene.add(dir1);

      const dir2 = new THREE.DirectionalLight(0xffffff, 0.55);
      dir2.position.set(-120, 60, -100);
      scene.add(dir2);

      const grid = new THREE.GridHelper(300, 30, 0x888888, 0x444444);
      scene.add(grid);

      const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(300, 300),
        new THREE.MeshStandardMaterial({
          color: 0x2b2e34,
          roughness: 1.0,
          metalness: 0.0,
          transparent: true,
          opacity: 0.35
        })
      );
      floor.rotation.x = -Math.PI / 2;
      scene.add(floor);

      window.addEventListener("resize", onResize);

      animate();
    }

    function onResize() {
      if (!camera || !renderer) return;
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);

      if (controls) {
        controls.update();
      }

      if (renderer && scene && camera) {
        renderer.render(scene, camera);
      }
    }

    function clearCurrentObject() {
      if (!currentObject) return;

      scene.remove(currentObject);

      currentObject.traverse((child) => {
        if (child.isMesh) {
          if (child.geometry) {
            child.geometry.dispose();
          }
          if (child.material) {
            if (Array.isArray(child.material)) {
              child.material.forEach((m) => m.dispose());
            } else {
              child.material.dispose();
            }
          }
        }
      });

      currentObject = null;
    }

    function applyMaterial(object) {
      object.traverse((child) => {
        if (child.isMesh) {
          child.material = new THREE.MeshStandardMaterial({
            color: 0xd6d8dd,
            roughness: 0.82,
            metalness: 0.03
          });
        }
      });
    }

    function fitObject(object) {
      const box = new THREE.Box3().setFromObject(object);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();

      box.getSize(size);
      box.getCenter(center);

      object.position.sub(center);

      const maxAxis = Math.max(size.x, size.y, size.z);
      if (maxAxis > 0) {
        const scale = 100 / maxAxis;
        object.scale.setScalar(scale);
      }

      const box2 = new THREE.Box3().setFromObject(object);
      const center2 = new THREE.Vector3();
      box2.getCenter(center2);

      object.position.x -= center2.x;
      object.position.y -= box2.min.y;
      object.position.z -= center2.z;

      resetCamera();
    }

    function resetCamera() {
      if (!camera || !controls) return;
      camera.position.set(0, 80, 180);
      controls.target.set(0, 30, 0);
      controls.update();
    }

    async function loadModel() {
      setLoading(true);
      setStatus("model.obj を読み込み中...");

      return new Promise((resolve, reject) => {
        const loader = new OBJLoader();

        loader.load(
          MODEL_URL,
          (object) => {
            try {
              clearCurrentObject();
              applyMaterial(object);
              fitObject(object);
              scene.add(object);
              currentObject = object;

              setLoading(false);
              setStatus("表示中: model.obj", "#77d98b");
              resolve();
            } catch (error) {
              console.error(error);
              setLoading(false);
              setStatus("モデル整形エラー: " + error.message, "#ff7b7b");
              reject(error);
            }
          },
          undefined,
          (error) => {
            console.error(error);
            setLoading(false);
            setStatus("読み込み失敗。model.obj を同じ場所にアップしてください。", "#ff7b7b");
            reject(error);
          }
        );
      });
    }

    async function sha256(text) {
      const bytes = new TextEncoder().encode(text);
      const digest = await crypto.subtle.digest("SHA-256", bytes);
      return Array.from(new Uint8Array(digest))
        .map((b) => b.toString(16).padStart(2, "0"))
        .join("");
    }

    async function tryUnlock() {
      gateMsg.textContent = "";

      const input = passwordInput.value.trim();
      if (!input) {
        gateMsg.textContent = "パスワードを入力してください。";
        return;
      }

      const hash = await sha256(input);

      if (hash !== PASSWORD_HASH) {
        gateMsg.textContent = "パスワードが違います。";
        return;
      }

      sessionStorage.setItem("obj_viewer_unlocked", "1");
      gate.style.display = "none";

      if (!renderer) {
        initThree();
      }

      try {
        await loadModel();
      } catch (error) {
        console.error(error);
      }
    }

    async function copyUrl() {
      try {
        await navigator.clipboard.writeText(location.href);
        setStatus("URLをコピーしました。", "#77d98b");
      } catch (error) {
        console.error(error);
        setStatus("URLコピーに失敗しました。", "#ff7b7b");
      }
    }

    async function buildQRCode() {
      qrArea.innerHTML = "";
      qrCaption.textContent = location.href;

      try {
        const canvas = document.createElement("canvas");
        await QRCode.toCanvas(canvas, location.href, {
          width: 180,
          margin: 1,
          color: {
            dark: "#000000",
            light: "#ffffff"
          }
        });
        qrArea.appendChild(canvas);
      } catch (error) {
        console.error(error);
        qrArea.textContent = "QR生成失敗";
      }
    }

    unlockBtn.addEventListener("click", tryUnlock);

    passwordInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        tryUnlock();
      }
    });

    resetBtn.addEventListener("click", () => {
      resetCamera();
    });

    copyBtn.addEventListener("click", () => {
      copyUrl();
    });

    buildQRCode();

    if (sessionStorage.getItem("obj_viewer_unlocked") === "1") {
      gate.style.display = "none";
      initThree();
      loadModel().catch((error) => console.error(error));
    }
  </script>
</body>
</html>
