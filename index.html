<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3Dビューア</title>
</head>

<body style="margin:0;background:#111;color:white;font-family:sans-serif">

<h2>3Dビューア</h2>

<button onclick="openAR()">AR表示</button>

<script>
let currentFile = "models/sample.glb"; // ←ここは実際は選択したファイル

async function openAR(){

    // WebXR対応チェック
    let supported = false;

    if(navigator.xr && navigator.xr.isSessionSupported){
        try{
            supported = await navigator.xr.isSessionSupported("immersive-ar");
        }catch(e){}
    }

    if(supported){
        location.href = "webxr_ar.html?file=" + encodeURIComponent(currentFile);
    }else{
        location.href = "ar.html?file=" + encodeURIComponent(currentFile);
    }
}
</script>

</body>
</html>
