<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>3Dビューア</title>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <style>
    :root{
      --panel: rgba(20,24,31,0.58);
      --panel-strong: rgba(20,24,31,0.84);
      --panel-border: rgba(255,255,255,0.10);
      --text: #f4f6f8;
      --sub: #c7cfdb;
      --accent: #4ea1ff;
      --accent2: #2b78de;
      --ok: #79d98f;
      --danger: #ff8484;
      --warn: #ffd36b;
      --shadow: 0 10px 30px rgba(0,0,0,0.18);
      --radius: 16px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html, body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:transparent;
      color:var(--text);
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
    }

    body{
      overscroll-behavior:none;
    }

    #app{
      position:relative;
      width:100%;
      height:100%;
      overflow:hidden;
      background:transparent;
    }

    #viewer{
      position:absolute;
      inset:0;
      display:block;
      background:transparent;
    }

    canvas{
      display:block;
      width:100%;
      height:100%;
      touch-action:none;
      background:transparent !important;
    }

    .panel{
      position:absolute;
      z-index:20;
      background:var(--panel);
      border:1px solid var(--panel-border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      overflow:hidden;
    }

    .panelHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      cursor:pointer;
      user-select:none;
    }

    .panelHeaderTitle{
      font-size:13px;
      font-weight:800;
      color:#fff;
      margin:0;
    }

    .toggleMark{
      font-size:12px;
      color:#fff;
      opacity:0.9;
      flex-shrink:0;
    }

    #topPanel{
      top:calc(10px + var(--safe-top));
      left:10px;
      right:10px;
      padding:12px 14px;
    }

    #topPanelContent{
      margin-top:8px;
    }

    #title{
      margin:0 0 8px 0;
      font-size:17px;
      font-weight:800;
      line-height:1.35;
    }

    .label{
      margin:8px 0 2px 0;
      font-size:11px;
      font-weight:700;
      color:#ffffff;
      opacity:0.95;
    }

    .value{
      margin:0;
      font-size:12px;
      line-height:1.55;
      color:var(--sub);
      word-break:break-word;
      white-space:pre-line;
    }

    #currentData{
      color:var(--ok);
      font-weight:700;
    }

    #status{
      margin-top:8px;
      font-size:11px;
      line-height:1.45;
      color:var(--sub);
      white-space:pre-line;
      word-break:break-word;
    }

    #hintBubble{
      position:absolute;
      right:10px;
      top:calc(150px + var(--safe-top));
      z-index:18;
      padding:8px 10px;
      border-radius:14px;
      background:rgba(0,0,0,0.18);
      border:1px solid rgba(255,255,255,0.10);
      font-size:11px;
      line-height:1.5;
      color:#eef3fb;
      max-width:220px;
      pointer-events:none;
      opacity:1;
      transition:opacity 0.4s ease;
    }

    #loading{
      position:absolute;
      left:50%;
      bottom:calc(150px + var(--safe-bottom));
      transform:translateX(-50%);
      z-index:25;
      padding:8px 14px;
      border-radius:999px;
      font-size:11px;
      background:rgba(0,0,0,0.52);
      border:1px solid rgba(255,255,255,0.14);
      display:none;
      white-space:nowrap;
    }

    #modelPanel{
      z-index:22;
      left:10px;
      right:10px;
      bottom:calc(158px + var(--safe-bottom));
      padding:10px;
      max-height:32vh;
      background:var(--panel-strong);
    }

    #modelPanelContent{
      margin-top:8px;
      max-height:calc(32vh - 34px);
      overflow:auto;
    }

    #modelList{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .modelBtn{
      width:100%;
      min-height:40px;
      border:none;
      border-radius:12px;
      color:#fff;
      font-size:13px;
      font-weight:700;
      text-align:left;
      padding:9px 11px;
      cursor:pointer;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.10);
      line-height:1.45;
    }

    .modelBtn.active{
      background:linear-gradient(180deg,var(--accent),var(--accent2));
      border-color:rgba(255,255,255,0.18);
    }

    .emptyBox{
      padding:14px 12px;
      border-radius:12px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      color:var(--sub);
      font-size:13px;
      line-height:1.7;
    }

    #uiBarRow2{
      position:absolute;
      z-index:23;
      left:10px;
      right:10px;
      bottom:calc(66px + var(--safe-bottom));
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      align-items:center;
    }

    #uiBar{
      position:absolute;
      z-index:23;
      left:10px;
      right:10px;
      bottom:calc(10px + var(--safe-bottom));
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      align-items:center;
    }

    .btn{
      min-height:46px;
      border:none;
      border-radius:14px;
      color:#fff;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
      background:linear-gradient(180deg,var(--accent),var(--accent2));
      box-shadow:0 6px 16px rgba(43,120,222,0.20);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
    }

    .btn.sub{
      background:rgba(20,24,31,0.64);
      border:1px solid rgba(255,255,255,0.10);
      box-shadow:none;
    }

    .btn.warn{
      background:linear-gradient(180deg,#547fb2,#355b88);
    }

    .btn:disabled{
      opacity:0.45;
      cursor:default;
    }

    .btn:active,
    .modelBtn:active,
    #unlockBtn:active{
      transform:scale(0.985);
    }

    #gate{
      position:fixed;
      inset:0;
      z-index:60;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px 14px;
      background:rgba(0,0,0,0.52);
    }

    #gateCard{
      width:100%;
      max-width:420px;
      background:rgba(18,22,28,0.94);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:20px;
      box-shadow:0 20px 44px rgba(0,0,0,0.42);
      padding:20px 16px 16px;
    }

    #gateTitle{
      margin:0 0 10px 0;
      font-size:22px;
      line-height:1.4;
      font-weight:800;
    }

    #gateText{
      margin:0;
      font-size:14px;
      line-height:1.8;
      color:var(--sub);
    }

    .field{
      margin-top:14px;
    }

    .field label{
      display:block;
      margin-bottom:7px;
      font-size:13px;
      color:var(--sub);
    }

    .field input{
      width:100%;
      height:50px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.14);
      background:rgba(255,255,255,0.06);
      color:#fff;
      font-size:16px;
      padding:0 14px;
      outline:none;
    }

    .field input:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(78,161,255,0.18);
    }

    #unlockBtn{
      width:100%;
      height:50px;
      margin-top:14px;
      border:none;
      border-radius:14px;
      font-size:16px;
      font-weight:800;
      color:#fff;
      background:linear-gradient(180deg,var(--accent),var(--accent2));
      cursor:pointer;
    }

    #gateMsg{
      min-height:22px;
      margin-top:10px;
      font-size:13px;
      color:var(--danger);
      line-height:1.6;
      white-space:pre-line;
    }

    @media (max-width: 899px) and (orientation: landscape){
      #topPanel{
        left:10px;
        right:auto;
        width:280px;
        top:10px;
      }

      #hintBubble{
        top:auto;
        right:12px;
        bottom:118px;
      }

      #modelPanel{
        left:auto;
        right:10px;
        width:280px;
        bottom:118px;
        max-height:44vh;
      }

      #modelPanelContent{
        max-height:calc(44vh - 34px);
      }

      #uiBar{
        left:auto;
        right:10px;
        width:280px;
        bottom:10px;
      }

      #uiBarRow2{
        left:auto;
        right:10px;
        width:280px;
        bottom:66px;
      }

      .btn{
        min-height:38px;
        font-size:12px;
        border-radius:12px;
      }

      #loading{
        bottom:145px;
      }
    }

    @media (min-width: 900px){
      #topPanel{
        left:16px;
        top:16px;
        right:auto;
        width:330px;
      }

      #hintBubble{
        right:16px;
        top:16px;
      }

      #modelPanel{
        left:auto;
        right:16px;
        width:320px;
        bottom:122px;
        max-height:280px;
      }

      #modelPanelContent{
        max-height:220px;
      }

      #uiBar{
        left:auto;
        right:16px;
        width:320px;
        bottom:16px;
      }

      #uiBarRow2{
        left:auto;
        right:16px;
        width:320px;
        bottom:72px;
      }

      .btn{
        min-height:40px;
        font-size:12px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="viewer"></div>

    <div id="gate">
      <div id="gateCard">
        <h1 id="gateTitle">閲覧用パスワード</h1>
        <p id="gateText">共有されたパスワードを入力すると、モデル一覧を表示します。</p>

        <div class="field">
          <label for="passwordInput">パスワード</label>
          <input
            id="passwordInput"
            type="password"
            placeholder="パスワードを入力"
            autocomplete="off"
            autocapitalize="off"
            autocorrect="off"
            spellcheck="false"
          >
        </div>

        <button id="unlockBtn" type="button">開く</button>
        <div id="gateMsg"></div>
      </div>
    </div>

    <div id="topPanel" class="panel">
      <div id="topPanelHeader" class="panelHeader">
        <div class="panelHeaderTitle">3Dビューア</div>
        <div id="topToggleMark" class="toggleMark">▼</div>
      </div>

      <div id="topPanelContent">
        <div id="title">3Dビューア</div>

        <div class="label">表示中のデータ</div>
        <div id="currentData" class="value">未選択</div>

        <div class="label">対応形式</div>
        <div class="value">OBJ / FBX / GLB / GLTF</div>

        <div class="label">AR切替</div>
        <div id="arModeInfo" class="value">WebXR判定中...</div>

        <div class="label">操作方法</div>
        <div class="value">1本指で回転 / 2本指で移動・拡大縮小</div>

        <div id="status">待機中...</div>
      </div>
    </div>

    <div id="hintBubble">WebXR非対応端末では「現在のAR」を使ってください</div>

    <div id="modelPanel" class="panel">
      <div id="modelPanelHeader" class="panelHeader">
        <div class="panelHeaderTitle">models フォルダ内データ一覧</div>
        <div id="modelToggleMark" class="toggleMark">▼</div>
      </div>

      <div id="modelPanelContent">
        <div id="modelList"></div>
      </div>
    </div>

    <div id="uiBarRow2">
      <button id="currentArBtn" class="btn warn" type="button">現在のAR</button>
    </div>

    <div id="uiBar">
      <button id="webxrArBtn" class="btn sub" type="button">WebXR AR</button>
      <button id="resetBtn" class="btn" type="button">視点リセット</button>
    </div>

    <div id="loading">モデルを読み込み中...</div>
  </div>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { OBJLoader } from "three/addons/loaders/OBJLoader.js";
    import { MTLLoader } from "three/addons/loaders/MTLLoader.js";
    import { FBXLoader } from "three/addons/loaders/FBXLoader.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const PASSWORD = "p001";
    const API_TREE_MAIN = "https://api.github.com/repos/ASKR-created/ASKR-created.github.io/git/trees/main?recursive=1";
    const API_TREE_MASTER = "https://api.github.com/repos/ASKR-created/ASKR-created.github.io/git/trees/master?recursive=1";
    const MODELS_ROOT = "models/";
    const SUPPORTED_EXTENSIONS = [".obj", ".fbx", ".glb", ".gltf"];

    const viewer = document.getElementById("viewer");
    const gate = document.getElementById("gate");
    const passwordInput = document.getElementById("passwordInput");
    const unlockBtn = document.getElementById("unlockBtn");
    const gateMsg = document.getElementById("gateMsg");

    const statusEl = document.getElementById("status");
    const currentDataEl = document.getElementById("currentData");
    const arModeInfoEl = document.getElementById("arModeInfo");
    const loadingEl = document.getElementById("loading");
    const resetBtn = document.getElementById("resetBtn");
    const currentArBtn = document.getElementById("currentArBtn");
    const webxrArBtn = document.getElementById("webxrArBtn");
    const hintBubble = document.getElementById("hintBubble");
    const modelList = document.getElementById("modelList");

    const topPanelContent = document.getElementById("topPanelContent");
    const modelPanelContent = document.getElementById("modelPanelContent");
    const topPanelHeader = document.getElementById("topPanelHeader");
    const modelPanelHeader = document.getElementById("modelPanelHeader");
    const topToggleMark = document.getElementById("topToggleMark");
    const modelToggleMark = document.getElementById("modelToggleMark");

    let scene = null;
    let camera = null;
    let renderer = null;
    let controls = null;
    let currentObject = null;
    let currentModelFile = "";
    let hintTimer = null;
    let modelFiles = [];
    let viewerReady = false;
    let repoTreePaths = new Set();

    let topPanelOpen = true;
    let modelPanelOpen = true;
    let webxrSupported = false;

    function setStatus(text, color = "") {
      statusEl.textContent = text;
      statusEl.style.color = color || "";
    }

    function setCurrentData(text, color = "") {
      currentDataEl.textContent = text;
      currentDataEl.style.color = color || "";
    }

    function setLoading(flag) {
      loadingEl.style.display = flag ? "block" : "none";
    }

    function hideHintSoon() {
      if (hintTimer) clearTimeout(hintTimer);
      hintTimer = setTimeout(() => {
        hintBubble.style.opacity = "0";
      }, 3200);
    }

    function normalizeInput(value) {
      return value.replace(/ｐ/g, "p").replace(/Ｐ/g, "P").trim();
    }

    function applyPanelState() {
      topPanelContent.style.display = topPanelOpen ? "block" : "none";
      modelPanelContent.style.display = modelPanelOpen ? "block" : "none";
      topToggleMark.textContent = topPanelOpen ? "▼" : "▶";
      modelToggleMark.textContent = modelPanelOpen ? "▼" : "▶";
    }

    function setInitialPanelState() {
      if (window.innerWidth >= 900) {
        topPanelOpen = true;
        modelPanelOpen = true;
      } else {
        topPanelOpen = false;
        modelPanelOpen = false;
      }
      applyPanelState();
    }

    function toggleTopPanel() {
      topPanelOpen = !topPanelOpen;
      applyPanelState();
    }

    function toggleModelPanel() {
      modelPanelOpen = !modelPanelOpen;
      applyPanelState();
    }

    function encodePath(path) {
      return path.split("/").map(encodeURIComponent).join("/");
    }

    function getExt(path) {
      const i = path.lastIndexOf(".");
      return i >= 0 ? path.slice(i).toLowerCase() : "";
    }

    function getBaseName(path) {
      const lastSlash = path.lastIndexOf("/");
      return lastSlash >= 0 ? path.slice(lastSlash + 1) : path;
    }

    function getDir(path) {
      const lastSlash = path.lastIndexOf("/");
      return lastSlash >= 0 ? path.slice(0, lastSlash + 1) : "";
    }

    function getBaseWithoutExt(path) {
      const name = getBaseName(path);
      const dot = name.lastIndexOf(".");
      return dot >= 0 ? name.slice(0, dot) : name;
    }

    function hasFile(path) {
      return repoTreePaths.has(path);
    }

    async function detectWebXRAR() {
      try {
        if (!("xr" in navigator) || !navigator.xr || !navigator.xr.isSessionSupported) {
          webxrSupported = false;
        } else {
          webxrSupported = await navigator.xr.isSessionSupported("immersive-ar");
        }
      } catch (e) {
        webxrSupported = false;
      }

      if (webxrSupported) {
        arModeInfoEl.textContent = "WebXR AR と 現在のAR の両方が使えます";
        arModeInfoEl.style.color = "#79d98f";
      } else {
        arModeInfoEl.textContent = "WebXR AR 非対応。現在のARのみ使用できます";
        arModeInfoEl.style.color = "#ffd36b";
      }

      updateArButtons();
    }

    async function fetchTreeFrom(url) {
      const response = await fetch(url, {
        headers: { "Accept": "application/vnd.github+json" }
      });
      if (!response.ok) {
        throw new Error(String(response.status));
      }
      const json = await response.json();
      return json.tree || [];
    }

    async function fetchRepoTree() {
      try {
        return await fetchTreeFrom(API_TREE_MAIN);
      } catch (e) {
        return await fetchTreeFrom(API_TREE_MASTER);
      }
    }

    async function fetchModelFilesFromGitHub() {
      const tree = await fetchRepoTree();

      repoTreePaths = new Set(
        tree.filter(item => item.type === "blob").map(item => item.path)
      );

      return tree
        .filter(item => item.type === "blob")
        .map(item => item.path)
        .filter(path => path.startsWith(MODELS_ROOT))
        .filter(path => SUPPORTED_EXTENSIONS.includes(getExt(path)))
        .sort((a, b) => a.localeCompare(b, "ja"));
    }

    function initThree() {
      if (viewerReady) return;

      scene = new THREE.Scene();

      camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        5000
      );
      camera.position.set(0, 55, 145);

      renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setClearColor(0x000000, 0);
      viewer.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.screenSpacePanning = true;
      controls.enablePan = true;
      controls.enableZoom = true;
      controls.enableRotate = true;
      controls.minDistance = 30;
      controls.maxDistance = 320;
      controls.target.set(0, 24, 0);
      controls.update();

      controls.addEventListener("start", () => {
        hintBubble.style.opacity = "0";
      });

      const ambient = new THREE.AmbientLight(0xffffff, 1.45);
      scene.add(ambient);

      const dir1 = new THREE.DirectionalLight(0xffffff, 1.1);
      dir1.position.set(120, 180, 120);
      scene.add(dir1);

      const dir2 = new THREE.DirectionalLight(0xffffff, 0.45);
      dir2.position.set(-100, 60, -80);
      scene.add(dir2);

      window.addEventListener("resize", onResize, { passive: true });

      hideHintSoon();
      animate();
      viewerReady = true;
    }

    function onResize() {
      if (!camera || !renderer) return;
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      if (controls) controls.update();
      if (renderer && scene && camera) {
        renderer.render(scene, camera);
      }
    }

    function clearCurrentObject() {
      if (!currentObject) return;

      scene.remove(currentObject);

      currentObject.traverse((child) => {
        if (child.isMesh) {
          if (child.geometry) child.geometry.dispose();
          if (child.material) {
            if (Array.isArray(child.material)) {
              child.material.forEach((m) => m.dispose());
            } else {
              child.material.dispose();
            }
          }
        }
      });

      currentObject = null;
    }

    function applyFallbackMaterial(object) {
      object.traverse((child) => {
        if (child.isMesh && !child.material) {
          child.material = new THREE.MeshStandardMaterial({
            color: 0xd9dde4,
            roughness: 0.84,
            metalness: 0.03
          });
        }
      });
    }

    function resetCamera() {
      if (!camera || !controls) return;
      camera.position.set(0, 55, 145);
      controls.target.set(0, 24, 0);
      controls.update();
    }

    function fitObject(object) {
      const box = new THREE.Box3().setFromObject(object);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();

      box.getSize(size);
      box.getCenter(center);
      object.position.sub(center);

      const maxAxis = Math.max(size.x, size.y, size.z);
      if (maxAxis > 0) {
        const scale = 88 / maxAxis;
        object.scale.setScalar(scale);
      }

      const box2 = new THREE.Box3().setFromObject(object);
      const center2 = new THREE.Vector3();
      box2.getCenter(center2);

      object.position.x -= center2.x;
      object.position.y -= box2.min.y;
      object.position.z -= center2.z;

      resetCamera();
    }

    function updateModelButtons() {
      const buttons = modelList.querySelectorAll(".modelBtn");
      buttons.forEach((btn) => {
        if (btn.dataset.file === currentModelFile) {
          btn.classList.add("active");
        } else {
          btn.classList.remove("active");
        }
      });
    }

    async function tryLoadObjWithMtl(relativePath) {
      const dir = getDir(relativePath);
      const base = getBaseWithoutExt(relativePath);
      const objUrl = "./" + encodePath(relativePath);
      const guessedMtlPath = dir + base + ".mtl";

      return new Promise((resolve, reject) => {
        if (!hasFile(guessedMtlPath)) {
          const objLoader = new OBJLoader();
          objLoader.load(
            objUrl,
            (object) => {
              applyFallbackMaterial(object);
              resolve(object);
            },
            undefined,
            reject
          );
          return;
        }

        const mtlLoader = new MTLLoader();
        mtlLoader.setPath("./" + encodePath(dir));
        mtlLoader.setResourcePath("./" + encodePath(dir));

        mtlLoader.load(
          encodeURIComponent(base + ".mtl"),
          (materials) => {
            materials.preload();

            const objLoader = new OBJLoader();
            objLoader.setMaterials(materials);
            objLoader.setPath("./" + encodePath(dir));

            objLoader.load(
              encodeURIComponent(getBaseName(relativePath)),
              (object) => resolve(object),
              undefined,
              () => {
                const fallback = new OBJLoader();
                fallback.load(
                  objUrl,
                  (object) => {
                    applyFallbackMaterial(object);
                    resolve(object);
                  },
                  undefined,
                  reject
                );
              }
            );
          },
          undefined,
          () => {
            const fallback = new OBJLoader();
            fallback.load(
              objUrl,
              (object) => {
                applyFallbackMaterial(object);
                resolve(object);
              },
              undefined,
              reject
            );
          }
        );
      });
    }

    async function loadFbx(relativePath) {
      const url = "./" + encodePath(relativePath);
      const loader = new FBXLoader();

      return new Promise((resolve, reject) => {
        loader.load(url, resolve, undefined, reject);
      });
    }

    async function loadGltf(relativePath) {
      const url = "./" + encodePath(relativePath);
      const loader = new GLTFLoader();

      return new Promise((resolve, reject) => {
        loader.load(
          url,
          (gltf) => resolve(gltf.scene),
          undefined,
          reject
        );
      });
    }

    async function loadModel(relativePath) {
      setLoading(true);
      setStatus(relativePath + " を読み込み中...");
      currentModelFile = relativePath;
      updateModelButtons();
      setCurrentData(relativePath, "#79d98f");
      updateArButtons();

      try {
        let object = null;
        const ext = getExt(relativePath);

        if (ext === ".obj") {
          object = await tryLoadObjWithMtl(relativePath);
        } else if (ext === ".fbx") {
          object = await loadFbx(relativePath);
        } else if (ext === ".glb" || ext === ".gltf") {
          object = await loadGltf(relativePath);
        } else {
          throw new Error("未対応形式です: " + ext);
        }

        clearCurrentObject();
        fitObject(object);
        scene.add(object);
        currentObject = object;

        setStatus("読み込み完了", "#79d98f");
      } catch (error) {
        console.error(error);
        setStatus("読み込み失敗: " + relativePath + "\n" + (error.message || error), "#ff8484");
      } finally {
        setLoading(false);
      }
    }

    function buildModelList(files) {
      modelList.innerHTML = "";

      if (!files.length) {
        const empty = document.createElement("div");
        empty.className = "emptyBox";
        empty.textContent = "models フォルダ内に対応データはありません";
        modelList.appendChild(empty);
        setCurrentData("データはありません", "#ff8484");
        updateArButtons();
        return;
      }

      files.forEach((file) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "modelBtn";
        btn.textContent = file;
        btn.dataset.file = file;

        btn.addEventListener("click", async () => {
          await loadModel(file);
          if (window.innerWidth < 900) {
            modelPanelOpen = false;
            applyPanelState();
          }
        });

        modelList.appendChild(btn);
      });

      updateModelButtons();
      updateArButtons();
    }

    function getSiblingPathWithExt(path, ext) {
      const dir = getDir(path);
      const base = getBaseWithoutExt(path);
      return dir + base + ext;
    }

    function getCurrentArFile() {
      if (!currentModelFile) return "";
      const ext = getExt(currentModelFile);

      if (ext === ".glb" || ext === ".gltf") return currentModelFile;

      const glb = getSiblingPathWithExt(currentModelFile, ".glb");
      if (hasFile(glb)) return glb;

      const gltf = getSiblingPathWithExt(currentModelFile, ".gltf");
      if (hasFile(gltf)) return gltf;

      return "";
    }

    function updateArButtons() {
      const arFile = getCurrentArFile();
      currentArBtn.disabled = !arFile;
      webxrArBtn.disabled = !arFile || !webxrSupported;
    }

    function openCurrentAr() {
      const arFile = getCurrentArFile();
      if (!arFile) {
        setStatus("対応するAR用データがありません", "#ff8484");
        return;
      }
      window.location.href = `ar.html?file=${encodeURIComponent(arFile)}`;
    }

    function openWebxrAr() {
      const arFile = getCurrentArFile();
      if (!arFile) {
        setStatus("対応するAR用データがありません", "#ff8484");
        return;
      }
      if (!webxrSupported) {
        setStatus("この端末ではWebXR ARは使えません。現在のARをご利用ください", "#ffd36b");
        return;
      }
      window.location.href = `webxr_ar.html?file=${encodeURIComponent(arFile)}`;
    }

    async function unlockViewer(forceOpen = false) {
      unlockBtn.disabled = true;
      unlockBtn.textContent = "確認中...";
      gateMsg.textContent = "";

      const input = normalizeInput(passwordInput.value);

      if (!input) {
        gateMsg.textContent = "パスワードを入力してください";
        unlockBtn.disabled = false;
        unlockBtn.textContent = "開く";
        return;
      }

      if (input !== PASSWORD) {
        gateMsg.textContent = "パスワードが違います";
        unlockBtn.disabled = false;
        unlockBtn.textContent = "開く";
        return;
      }

      try {
        setStatus("models フォルダを確認中...");
        initThree();
        await detectWebXRAR();

        modelFiles = await fetchModelFilesFromGitHub();
        buildModelList(modelFiles);

        if (modelFiles.length === 0) {
          setStatus("models フォルダ内に対応データはありません", "#ff8484");
        } else {
          setStatus("データを検出しました: " + modelFiles.length + "件", "#79d98f");
        }

        sessionStorage.setItem("obj_viewer_unlocked", "1");
        gate.style.display = "none";

        if (!forceOpen) {
          setInitialPanelState();
        }
      } catch (error) {
        console.error(error);
        gateMsg.textContent = "起動に失敗しました";
        setStatus("起動に失敗しました\n" + (error.message || error), "#ff8484");
      } finally {
        unlockBtn.disabled = false;
        unlockBtn.textContent = "開く";
      }
    }

    topPanelHeader.addEventListener("click", toggleTopPanel);
    modelPanelHeader.addEventListener("click", toggleModelPanel);

    unlockBtn.addEventListener("click", () => unlockViewer(false));

    passwordInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        unlockViewer(false);
      }
    });

    resetBtn.addEventListener("click", () => {
      resetCamera();
      hintBubble.style.opacity = "0";
    });

    currentArBtn.addEventListener("click", openCurrentAr);
    webxrArBtn.addEventListener("click", openWebxrAr);

    setInitialPanelState();
    detectWebXRAR();

    if (sessionStorage.getItem("obj_viewer_unlocked") === "1") {
      passwordInput.value = PASSWORD;
      unlockViewer(true);
      gate.style.display = "none";
    }
  </script>
</body>
