<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>3Dビューア</title>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<style>
body{margin:0;background:#111;color:#fff;font-family:sans-serif;}
#viewer{position:absolute;inset:0;}
button{position:fixed;bottom:10px;left:10px;right:10px;height:50px;}
</style>
</head>

<body>
<div id="viewer"></div>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { FBXLoader } from "three/addons/loaders/FBXLoader.js";

let scene, camera, renderer, controls;
let mixer = null;
let clock = new THREE.Clock();
let currentAction = null;
let isPlaying = true;

init();

function init(){
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 1000);
  camera.position.set(0,2,5);

  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth, innerHeight);
  document.getElementById("viewer").appendChild(renderer.domElement);

  controls = new OrbitControls(camera, renderer.domElement);

  const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
  scene.add(light);

  window.addEventListener("resize",()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  // 👇 ここでモデル読み込み（テスト）
  loadModel("models/sample.glb");

  // タップで再生停止
  renderer.domElement.addEventListener("click", toggleAnimation);

  animate();
}

function loadModel(path){

  const ext = path.split(".").pop().toLowerCase();

  if(ext === "glb" || ext === "gltf"){
    const loader = new GLTFLoader();
    loader.load(path, (gltf)=>{
      scene.add(gltf.scene);

      if(gltf.animations.length > 0){
        mixer = new THREE.AnimationMixer(gltf.scene);
        currentAction = mixer.clipAction(gltf.animations[0]);
        currentAction.play();
      }
    });
  }

  if(ext === "fbx"){
    const loader = new FBXLoader();
    loader.load(path, (fbx)=>{
      scene.add(fbx);

      if(fbx.animations.length > 0){
        mixer = new THREE.AnimationMixer(fbx);
        currentAction = mixer.clipAction(fbx.animations[0]);
        currentAction.play();
      }
    });
  }
}

function toggleAnimation(){
  if(!mixer || !currentAction) return;

  if(isPlaying){
    currentAction.paused = true;
  }else{
    currentAction.paused = false;
  }
  isPlaying = !isPlaying;
}

function animate(){
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  if(mixer) mixer.update(delta);

  renderer.render(scene, camera);
}
</script>
</body>
</html>
