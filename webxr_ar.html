<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>WebXR AR</title>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <style>
    html, body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#10141c;
      color:#fff;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
    }

    #app{
      position:relative;
      width:100%;
      height:100%;
    }

    #viewer{
      position:absolute;
      inset:0;
    }

    #overlay{
      position:absolute;
      top:10px;
      left:10px;
      right:10px;
      z-index:20;
      background:rgba(20,24,31,0.78);
      border:1px solid rgba(255,255,255,0.10);
      border-radius:16px;
      padding:12px 14px;
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }

    #title{
      margin:0 0 8px 0;
      font-size:18px;
      font-weight:800;
    }

    #status{
      font-size:13px;
      line-height:1.6;
      color:#c7cfdb;
      white-space:pre-line;
    }

    #buttons{
      position:absolute;
      left:10px;
      right:10px;
      bottom:10px;
      z-index:20;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .btn{
      min-height:46px;
      border:none;
      border-radius:14px;
      color:#fff;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
      background:linear-gradient(180deg,#4ea1ff,#2b78de);
    }

    .btn.sub{
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.10);
    }

    #unsupported{
      position:absolute;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:30;
      background:rgba(0,0,0,0.72);
    }

    #unsupportedCard{
      width:100%;
      max-width:420px;
      background:rgba(20,24,31,0.92);
      border:1px solid rgba(255,255,255,0.10);
      border-radius:18px;
      padding:18px;
    }

    #unsupportedCard h2{
      margin:0 0 10px 0;
      font-size:22px;
    }

    #unsupportedCard p{
      margin:0 0 14px 0;
      line-height:1.7;
      color:#c7cfdb;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="viewer"></div>

    <div id="overlay">
      <div id="title">WebXR AR</div>
      <div id="status">対応確認中...</div>
    </div>

    <div id="buttons">
      <button id="startBtn" class="btn">WebXR AR開始</button>
      <button id="backBtn" class="btn sub">3Dビューアへ</button>
    </div>

    <div id="unsupported">
      <div id="unsupportedCard">
        <h2>WebXR AR 非対応</h2>
        <p>この端末やブラウザでは WebXR AR を使用できません。現在のARビューアをご利用ください。</p>
        <button id="fallbackBtn" class="btn">現在のARを開く</button>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from "three";
    import { ARButton } from "three/addons/webxr/ARButton.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const viewer = document.getElementById("viewer");
    const statusEl = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");
    const backBtn = document.getElementById("backBtn");
    const unsupported = document.getElementById("unsupported");
    const fallbackBtn = document.getElementById("fallbackBtn");

    function getQueryFile() {
      const params = new URLSearchParams(location.search);
      return params.get("file") || "";
    }

    const file = getQueryFile();

    let renderer, scene, camera, controller;
    let reticle, hitTestSource = null, hitTestSourceRequested = false;
    let loadedScene = null;

    function setStatus(text, error = false) {
      statusEl.textContent = text;
      statusEl.style.color = error ? "#ff8484" : "#c7cfdb";
    }

    async function checkSupport() {
      try {
        if (!navigator.xr || !navigator.xr.isSessionSupported) return false;
        return await navigator.xr.isSessionSupported("immersive-ar");
      } catch (e) {
        return false;
      }
    }

    function initThree() {
      scene = new THREE.Scene();

      camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true;
      viewer.appendChild(renderer.domElement);

      const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
      scene.add(light);

      const ringGeo = new THREE.RingGeometry(0.08, 0.1, 32).rotateX(-Math.PI / 2);
      const ringMat = new THREE.MeshBasicMaterial({ color: 0x4ea1ff });
      reticle = new THREE.Mesh(ringGeo, ringMat);
      reticle.matrixAutoUpdate = false;
      reticle.visible = false;
      scene.add(reticle);

      controller = renderer.xr.getController(0);
      controller.addEventListener("select", onSelect);
      scene.add(controller);

      window.addEventListener("resize", onResize);
      renderer.setAnimationLoop(render);
    }

    function onResize() {
      if (!camera || !renderer) return;
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    async function loadModel() {
      if (!file) {
        setStatus("AR用ファイルが指定されていません。", true);
        return;
      }

      return new Promise((resolve, reject) => {
        const loader = new GLTFLoader();
        loader.load(
          file,
          (gltf) => {
            loadedScene = gltf.scene;
            setStatus("モデル準備完了\n床を映してタップで配置");
            resolve();
          },
          undefined,
          reject
        );
      });
    }

    function onSelect() {
      if (!reticle.visible || !loadedScene) return;

      const placed = loadedScene.clone(true);
      placed.position.setFromMatrixPosition(reticle.matrix);
      placed.scale.setScalar(0.3);
      scene.add(placed);
      setStatus("配置しました");
    }

    function render(timestamp, frame) {
      if (frame) {
        const session = renderer.xr.getSession();
        const referenceSpace = renderer.xr.getReferenceSpace();

        if (!hitTestSourceRequested) {
          session.requestReferenceSpace("viewer").then((viewerSpace) => {
            session.requestHitTestSource({ space: viewerSpace }).then((source) => {
              hitTestSource = source;
            });
          });

          session.addEventListener("end", () => {
            hitTestSourceRequested = false;
            hitTestSource = null;
          });

          hitTestSourceRequested = true;
        }

        if (hitTestSource) {
          const hitTestResults = frame.getHitTestResults(hitTestSource);

          if (hitTestResults.length) {
            const hit = hitTestResults[0];
            const pose = hit.getPose(referenceSpace);
            reticle.visible = true;
            reticle.matrix.fromArray(pose.transform.matrix);
          } else {
            reticle.visible = false;
          }
        }
      }

      renderer.render(scene, camera);
    }

    async function startAR() {
      try {
        const button = ARButton.createButton(renderer, { requiredFeatures: ["hit-test"] });
        button.style.display = "none";
        document.body.appendChild(button);
        button.click();
        setStatus("WebXR AR開始中...");
      } catch (e) {
        setStatus("WebXR ARを開始できませんでした。", true);
      }
    }

    startBtn.addEventListener("click", startAR);

    backBtn.addEventListener("click", () => {
      window.location.href = "index.html";
    });

    fallbackBtn.addEventListener("click", () => {
      window.location.href = "ar.html?file=" + encodeURIComponent(file);
    });

    (async () => {
      const supported = await checkSupport();
      if (!supported) {
        unsupported.style.display = "flex";
        setStatus("この端末ではWebXR AR非対応", true);
        return;
      }

      initThree();

      try {
        await loadModel();
      } catch (e) {
        setStatus("モデル読み込み失敗", true);
      }
    })();
  </script>
</body>
</html>
